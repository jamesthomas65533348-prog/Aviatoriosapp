<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pilot Profile - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-dark: #000000;
            --card-glass: rgba(28, 28, 30, 0.7);
            --gold: #fbbf24;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        body { 
            background: var(--ios-dark);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000 70%);
        }

        .bouncy { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .bouncy:active { transform: scale(0.92); opacity: 0.8; }

        /* --- HEADER --- */
        .profile-header {
            padding: 40px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }

        .back-btn {
            width: 40px; height: 40px; display: flex; justify-content: center;
            align-items: center; border-radius: 50%; background: var(--card-glass);
            font-size: 18px;
        }

        /* --- PROFILE SECTION --- */
        .pilot-identity {
            text-align: center; padding: 20px 20px 30px;
        }

        .avatar-container {
            position: relative; width: 110px; height: 110px; margin: 0 auto 15px;
        }
        
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--ios-blue);
            background: #1c1c1e;
        }

        .edit-pfp-btn {
            position: absolute; bottom: 0; right: 0;
            background: var(--ios-blue); color: white; width: 32px; height: 32px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            border: 3px solid var(--ios-dark); font-size: 12px;
        }

        .rank-badge {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold); padding: 4px 12px; border-radius: 50px;
            font-size: 10px; font-weight: 800; display: inline-block; 
            margin-top: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- CARDS --- */
        .stats-row { display: flex; gap: 12px; padding: 0 20px; margin-bottom: 20px; }
        .stat-card {
            flex: 1; background: var(--card-glass); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-label { font-size: 10px; color: #8e8e93; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }

        .settings-group { padding: 0 20px 100px; }
        .ios-list {
            background: var(--card-glass); border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
        }

        .list-item {
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-item:last-child { border-bottom: none; }
        
        .item-title { font-size: 11px; color: #8e8e93; font-weight: 600; text-transform: uppercase; margin-bottom: 2px; }
        .item-data { font-size: 15px; font-weight: 600; color: #fff; }

        /* --- ACCESS CODE BOX --- */
        .access-box {
            background: rgba(0, 122, 255, 0.1); padding: 15px 20px; border-radius: 20px;
            margin: 0 20px 20px; border: 1px solid rgba(0, 122, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        .code-text { font-family: 'JetBrains Mono', monospace; color: var(--ios-blue); font-weight: 800; font-size: 18px; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 14px;
            z-index: 10000; display: none; background: rgba(28, 28, 30, 0.95);
            color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div class="profile-header">
        <div class="back-btn bouncy" onclick="location.href='index.html'">
            <i class="fa-solid fa-chevron-left"></i>
        </div>
        <div style="font-weight: 800; font-size: 15px; letter-spacing: -0.5px;">Account</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="pilot-identity">
        <div class="avatar-container">
            <img id="pfp" src="https://ui-avatars.com/api/?name=U&background=007aff&color=fff" class="avatar-img">
            <label for="file-input" class="edit-pfp-btn bouncy">
                <i class="fa-solid fa-camera"></i>
            </label>
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="uploadPfp()">
        </div>
        <h2 id="display-name" style="margin: 0; font-size: 24px; font-weight: 800;">---</h2>
        <div class="rank-badge" id="rank-name">Elite Pilot</div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Status</div>
            <div class="stat-val" style="color: var(--ios-green);">
                <i class="fa-solid fa-circle-check"></i> Verified
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Clearance</div>
            <div class="stat-val" id="acc-type" style="color: var(--ios-blue);">Level 1</div>
        </div>
    </div>

    <div class="access-box">
        <div>
            <div class="item-title">Access Code</div>
            <div class="code-text" id="p-code">---</div>
        </div>
        <div class="back-btn bouncy" onclick="copyCode()" style="background: var(--ios-blue); color: white;">
            <i class="fa-solid fa-copy"></i>
        </div>
    </div>

    <div class="settings-group">
        <div class="ios-list">
            <div class="list-item">
                <div>
                    <div class="item-title">Email</div>
                    <div class="item-data" id="val-email">---</div>
                </div>
                <i class="fa-solid fa-envelope" style="color: #48484a;"></i>
            </div>

            <div class="list-item">
                <div>
                    <div class="item-title">NIN Status</div>
                    <div class="item-data" id="val-nin">Not Linked</div>
                </div>
                <i class="fa-solid fa-id-card" style="color: #48484a;"></i>
            </div>

            <div class="list-item bouncy" onclick="showToast('Encryption Active', true)">
                <div>
                    <div class="item-title">Security</div>
                    <div class="item-data">Biometric Locked</div>
                </div>
                <i class="fa-solid fa-shield-halved" style="color: var(--ios-green);"></i>
            </div>
        </div>
        
        <p style="text-align: center; color: #48484a; font-size: 11px; margin-top: 30px; font-weight: 600;">
            TERMINAL ID: <span id="terminal-id" style="color: #8e8e93;">...</span>
        </p>
    </div>

    <script>
        var _supa;
        var userEmail = localStorage.getItem('user_email');

        window.onload = function() {
            if(!userEmail) { location.href='login.html'; return; }
            _supa = getClient();
            loadProfile();
            document.getElementById('terminal-id').innerText = Math.random().toString(36).substring(2, 12).toUpperCase();
        };

        async function loadProfile() {
            var { data, error } = await _supa.from('profiles').select('*').eq('email', userEmail).single();
            if(data) {
                // Name Logic
                document.getElementById('display-name').innerText = data.full_name || data.email.split('@')[0];
                document.getElementById('val-email').innerText = data.email;
                document.getElementById('p-code').innerText = data.profile_code || "AV-000";
                
                if(data.nin) {
                    document.getElementById('val-nin').innerText = "Verified •••• " + data.nin.toString().slice(-4);
                }

                if(data.avatar_url) {
                    document.getElementById('pfp').src = data.avatar_url;
                }

                if(data.role === 'ADMIN') {
                    document.getElementById('rank-name').innerText = "ADMINISTRATOR";
                    document.getElementById('rank-name').style.borderColor = "var(--ios-red)";
                    document.getElementById('rank-name').style.color = "var(--ios-red)";
                    document.getElementById('acc-type').innerText = "Root Access";
                }
            }
        }

        async function uploadPfp() {
            var file = document.getElementById('file-input').files[0];
            if(!file) return;

            showToast("Syncing Profile...", true);
            var fileName = "pfp_" + Date.now() + "_" + userEmail.replace(/[^a-zA-Z0-9]/g, '');
            
            var { data, error } = await _supa.storage.from('avatars').upload(fileName, file);
            if(error) return showToast("Upload failed", false);

            var publicURL = _supa.storage.from('avatars').getPublicUrl(fileName).data.publicUrl;
            await _supa.from('profiles').update({ avatar_url: publicURL }).eq('email', userEmail);
            
            document.getElementById('pfp').src = publicURL;
            showToast("Update Successful", true);
        }

        function copyCode() {
            var code = document.getElementById('p-code').innerText;
            navigator.clipboard.writeText(code);
            showToast("Code Copied", true);
        }

        function showToast(m, s) {
            var t = document.getElementById('toast');
            t.innerText = m; 
            t.style.display = "block";
            setTimeout(() => t.style.display="none", 2000);
        }
    </script>
</body>
</html>
