<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flight Logs - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-dark: #000000;
            --card-glass: rgba(28, 28, 30, 0.7);
            --gold: #fbbf24;
            --primary: var(--ios-blue);
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            background: var(--ios-dark);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000 70%);
            background-attachment: fixed;
        }

        .bouncy { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .bouncy:active { transform: scale(0.92); opacity: 0.8; }

        /* --- HEADER --- */
        .history-header {
            padding: 50px 20px 15px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* --- TABS --- */
        .tab-wrapper { padding: 20px; }
        .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; font-size: 13px; font-weight: 700; transition: 0.3s; color: #8e8e93; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* --- NOTICE --- */
        .notice-card {
            margin: 0 20px 20px; background: rgba(255, 59, 48, 0.08);
            border-radius: 18px; padding: 15px; display: none;
            border: 1px solid rgba(255, 59, 48, 0.2); animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }

        /* --- LIST --- */
        .history-list { display: flex; flex-direction: column; gap: 12px; padding: 0 20px 100px; }

        .log-card { 
            background: var(--card-glass); padding: 20px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); display: flex; 
            justify-content: space-between; align-items: center; 
            backdrop-filter: blur(15px);
        }

        .meta-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .amount-text { font-size: 20px; font-weight: 800; color: #fff; }
        .date-text { font-size: 11px; color: #8e8e93; font-weight: 500; margin-top: 4px; display: block; }

        /* --- STATUS ANIMATIONS --- */
        .status-box { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .status-label { font-size: 10px; font-weight: 900; margin-bottom: 8px; text-transform: uppercase; }

        /* Pending: Six Tiny Dots Wave */
        .dot-loader { display: flex; gap: 3px; }
        .dot-loader span { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; animation: dotWave 1.2s infinite ease-in-out; }
        .dot-loader span:nth-child(2) { animation-delay: 0.1s; }
        .dot-loader span:nth-child(3) { animation-delay: 0.2s; }
        .dot-loader span:nth-child(4) { animation-delay: 0.3s; }
        .dot-loader span:nth-child(5) { animation-delay: 0.4s; }
        .dot-loader span:nth-child(6) { animation-delay: 0.5s; }
        @keyframes dotWave { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-5px); opacity: 1; } }

        /* Success & Reject Animated SVG */
        .stat-svg { width: 28px; height: 28px; }
        .svg-path { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 0.8s forwards ease-out; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        .loader-ring { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.05); border-top-color: var(--ios-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 80px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="history-header">
        <div class="bouncy" onclick="location.href='index.html'" style="color:var(--ios-blue); font-weight:600;">
            <i class="fa-solid fa-chevron-left"></i> Back
        </div>
        <div style="font-weight: 800; font-size: 15px; letter-spacing: 1px;">FLIGHT LOGS</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="tab-wrapper">
        <div class="tabs">
            <div class="tab active bouncy" id="tab-dep" onclick="switchTab('deposits')">REFUELS</div>
            <div class="tab bouncy" id="tab-wit" onclick="switchTab('withdrawals')">PAYOUTS</div>
        </div>
    </div>

    <div id="payout-notice" class="notice-card">
        <div style="display:flex; gap:12px; align-items:center;">
            <i class="fa-solid fa-calendar-clock" style="color:var(--ios-red); font-size:20px;"></i>
            <div style="font-size: 11px; line-height: 1.4; font-weight: 600;">
                Weekend payouts (Fri-Sun) are processed on business days (Mon-Thu).
            </div>
        </div>
    </div>

    <div id="history-container" class="history-list"></div>

    <script>
        var _supa; var userEmail = localStorage.getItem('user_email');
        window.onload = function() { _supa = getClient(); loadHistory('deposits'); };

        function switchTab(type) {
            const isDep = type === 'deposits';
            document.getElementById('tab-dep').classList.toggle('active', isDep);
            document.getElementById('tab-wit').classList.toggle('active', !isDep);
            document.getElementById('payout-notice').style.display = isDep ? 'none' : 'block';
            document.documentElement.style.setProperty('--primary', isDep ? 'var(--ios-blue)' : 'var(--ios-red)');
            loadHistory(type);
        }

        async function loadHistory(table) {
            const container = document.getElementById('history-container');
            container.innerHTML = '<div class="loader-ring"></div>';
            const { data, error } = await _supa.from(table).select('*').eq('email', userEmail).order('created_at', { ascending: false });
            
            if (error || !data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; margin-top:80px; opacity:0.2;"><i class="fa-solid fa-ghost" style="font-size:3rem;"></i><p>Empty Sky</p></div>';
                return;
            }

            container.innerHTML = data.map(item => {
                const rawStatus = (item.status || 'PENDING').toUpperCase();
                let statusHTML = '';
                
                // PENDING LOGIC: Write-up + 6 tiny dots
                if (rawStatus === 'PENDING') {
                    statusHTML = `
                        <div class="status-box">
                            <span class="status-label" style="color:var(--gold)">Pending</span>
                            <div class="dot-loader"><span></span><span></span><span></span><span></span><span></span><span></span></div>
                        </div>`;
                } 
                // SUCCESS/APPROVED LOGIC: SVG Animation
                else if (['SUCCESS', 'COMPLETED', 'APPROVED'].includes(rawStatus)) {
                    statusHTML = `
                        <div class="status-box">
                            <span class="status-label" style="color:var(--ios-green)">Approved</span>
                            <svg class="stat-svg" viewBox="0 0 52 52">
                                <path class="svg-path" d="M14 27l7 7 16-16" style="stroke:var(--ios-green)"/>
                            </svg>
                        </div>`;
                } 
                // REJECTED/FAILED LOGIC: SVG Animation
                else {
                    statusHTML = `
                        <div class="status-box">
                            <span class="status-label" style="color:var(--ios-red)">Rejected</span>
                            <svg class="stat-svg" viewBox="0 0 52 52">
                                <path class="svg-path" d="M16 16l20 20M36 16L16 36" style="stroke:var(--ios-red)"/>
                            </svg>
                        </div>`;
                }

                const amount = (table === 'withdrawals' && rawStatus === 'REJECTED' && item.original_amount) ? item.original_amount : item.amount;
                const typeLabel = table === 'deposits' ? 'Top-up' : 'Payout';
                const date = new Date(item.created_at).toLocaleDateString('en-GB', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});

                return `
                <div class="log-card bouncy" onclick="location.href='history-detail.html?id=${item.id}&type=${table}'">
                    <div class="log-info">
                        <span class="meta-tag" style="color:var(--primary)">${typeLabel}</span>
                        <span class="amount-text">₦${parseFloat(amount).toLocaleString()}</span>
                        <span class="date-text">${date}</span>
                    </div>
                    ${statusHTML}
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
