<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Verify - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #007aff; 
            --bg-dark: #000000; 
            --card-bg: rgba(28, 28, 30, 0.9); 
            --success: #32d74b;
            --error: #ff453a;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }
        input { user-select: auto !important; -webkit-user-select: auto !important; }

        body { 
            background: var(--bg-dark);
            color: white; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .bg-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,122,255,0.12) 0%, transparent 70%);
            z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 45px 25px; border-radius: 40px; 
            width: 90%; max-width: 370px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            animation: iosReveal 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(1.05) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h3 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        p { font-size: 15px; color: #8e8e93; margin: 12px 0 35px; line-height: 1.4; }

        /* --- iOS PIN INPUT STYLE --- */
        #otp-input { 
            width: 100%; padding: 20px; margin-bottom: 30px; 
            border-radius: 16px; border: none; 
            text-align: center; font-size: 32px; letter-spacing: 8px; 
            font-weight: 700; background: rgba(255, 255, 255, 0.08); 
            color: white; outline: none; transition: 0.3s;
        }
        #otp-input:focus { background: rgba(255, 255, 255, 0.12); }

        .verify-btn { 
            width: 100%; height: 56px; background: var(--primary); 
            color: white; border: none; border-radius: 14px; 
            font-size: 17px; font-weight: 600; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .verify-btn:active { transform: scale(0.96); opacity: 0.8; }

        /* --- LOADER --- */
        .loader { display: none; gap: 5px; align-items: center; }
        .dot { 
            width: 7px; height: 7px; background: white; border-radius: 50%; 
            animation: bounce 0.6s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { opacity: 0.3; transform: translateY(0); } to { opacity: 1; transform: translateY(-6px); } }

        .timer-box { margin-top: 30px; font-size: 15px; color: #8e8e93; }
        .resend-link { color: var(--primary); cursor: pointer; display: none; font-weight: 500; }
        
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            padding: 14px 24px; border-radius: 50px; z-index: 10000; 
            font-weight: 600; font-size: 15px; color: white;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap;
        }
        #toast.show { top: 60px; }

        .shake { animation: shakeAnim 0.4s ease; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>
    <div id="toast"></div>

    <div class="card" id="main-card">
        <h3>Verify Email</h3>
        <p>Enter the 6-digit code sent to<br>your inbox to continue.</p>
        
        <input type="number" id="otp-input" placeholder="000000" 
               oninput="if(this.value.length > 6) this.value = this.value.slice(0, 6)">
        
        <button id="verify-btn" class="verify-btn" onclick="handleVerify()">
            <span id="btn-text">Verify Account</span>
            <div id="btn-loader" class="loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </button>

        <div class="timer-box">
            <span id="timer-text">Resend code in <span id="timer" style="color: var(--primary)">03:00</span></span>
            <span id="resend-link" class="resend-link" onclick="requestNewCode()">Request New Code</span>
        </div>
    </div>

    <script>
        (function(){ emailjs.init("GeCipLr0kFPCN8feN"); })();

        var _supa;
        var myEmail = localStorage.getItem('user_email'); 
        var countdown;

        window.onload = function() {
            _supa = getClient();
            if (!myEmail) { location.href='register.html'; return; }
            startTimer(180);
        };

        function startTimer(seconds) {
            clearInterval(countdown);
            const display = document.querySelector('#timer');
            const timerText = document.querySelector('#timer-text');
            const resendLink = document.querySelector('#resend-link');
            
            resendLink.style.display = "none";
            timerText.style.display = "inline";

            let timer = seconds;
            countdown = setInterval(function () {
                let minutes = parseInt(timer / 60, 10);
                let secs = parseInt(timer % 60, 10);
                display.textContent = (minutes < 10 ? "0" : "") + minutes + ":" + (secs < 10 ? "0" : "") + secs;

                if (--timer < 0) {
                    clearInterval(countdown);
                    timerText.style.display = "none";
                    resendLink.style.display = "inline";
                }
            }, 1000);
        }

        function showToast(msg, isSuccess) {
            const t = document.getElementById('toast');
            t.innerHTML = isSuccess ? `<i class="fa-solid fa-circle-check"></i> ${msg}` : `<i class="fa-solid fa-circle-xmark"></i> ${msg}`;
            t.style.background = isSuccess ? "rgba(52, 215, 75, 0.95)" : "rgba(255, 69, 58, 0.95)";
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function resetBtn() {
            const btn = document.getElementById('verify-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            btn.disabled = false;
            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
        }

        async function requestNewCode() {
            const link = document.getElementById('resend-link');
            link.style.pointerEvents = "none";
            const originalText = link.innerText;
            link.innerText = "SENDING...";

            const newOTP = Math.floor(100000 + Math.random() * 900000);

            try {
                await emailjs.send('service_huev2pt', 'template_r50pcwk', {
                    email: myEmail,
                    passcode: newOTP
                });
                localStorage.setItem('pending_otp', newOTP);
                showToast("New Code Sent!", true);
                startTimer(180);
                link.innerText = originalText;
                link.style.pointerEvents = "auto";
            } catch (err) {
                showToast("Network Error", false);
                link.innerText = originalText;
                link.style.pointerEvents = "auto";
            }
        }

        async function handleVerify() {
            const input = document.getElementById('otp-input');
            const btn = document.getElementById('verify-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const card = document.getElementById('main-card');
            const correctOTP = localStorage.getItem('pending_otp');

            if (input.value.length < 6) return showToast("Enter 6-digit code", false);

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'flex';

            if (input.value === String(correctOTP)) {
                try {
                    const { error } = await _supa
                        .from('profiles')
                        .update({ otp_status: 'VERIFIED' })
                        .eq('email', myEmail);

                    if (error) throw error;
                    showToast("Verified Successfully!", true);
                    setTimeout(() => { location.href='login.html'; }, 2000);
                } catch (err) {
                    showToast("Sync Error", false);
                    resetBtn();
                }
            } else {
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
                showToast("Invalid Code", false);
                resetBtn();
            }
        }
    </script>
</body>
</html>
