<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Receipt - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-yellow: #ffcc00;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            color: white; background: #000; overflow-x: hidden;
        }
        
        .bg-glow {
            position: fixed; top: 0; left: 0; right: 0; height: 300px;
            filter: blur(80px); opacity: 0.35; z-index: -1;
            transition: 1s ease;
        }

        body.PENDING .bg-glow { background: var(--ios-yellow); }
        body.APPROVED, body.SUCCESS, body.COMPLETED .bg-glow { background: var(--ios-green); }
        body.REJECTED, body.FAILED .bg-glow { background: var(--ios-red); }

        .header { 
            padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
        }

        .back-btn { color: var(--ios-red); font-weight: 600; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* --- ENHANCED PRINT TEMPLATE --- */
        #print-template {
            position: fixed; left: -9999px; top: 0;
            width: 500px; height: 850px;
            background: #ffffff url('full-receipt.png') no-repeat center center;
            background-size: cover;
            color: #1c1c1e;
            overflow: hidden;
        }

        /* Dynamic color overlays for the saved image */
        #print-template.APPROVED-BG { background-color: #f2faf4; }
        #print-template.REJECTED-BG { background-color: #fff5f5; }

        .t-glow {
            position: absolute; top: 0; left: 0; right: 0; height: 200px;
            filter: blur(60px); opacity: 0.15;
        }
        .APPROVED-BG .t-glow { background: var(--ios-green); }
        .REJECTED-BG .t-glow { background: var(--ios-red); }

        .t-amt { 
            position: absolute; top: 240px; width: 100%; text-align: center; 
            font-size: 42px; font-weight: 900; letter-spacing: -1px;
        }
        .APPROVED-BG .t-amt { color: var(--ios-green); }
        .REJECTED-BG .t-amt { color: var(--ios-red); }

        .t-status { 
            position: absolute; top: 160px; right: 40px; 
            padding: 5px 15px; border-radius: 20px;
            font-size: 14px; font-weight: 900; text-transform: uppercase;
        }
        .APPROVED-BG .t-status { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); border: 1px solid var(--ios-green); }
        .REJECTED-BG .t-status { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); border: 1px solid var(--ios-red); }

        .t-date, .t-ref { 
            position: absolute; left: 50px; font-size: 15px; 
            font-weight: 600; color: #3a3a3c;
        }
        .t-date { top: 380px; }
        .t-ref { top: 415px; }
        /* -------------------------------- */

        .receipt-container { padding: 20px; animation: iosPop 0.4s cubic-bezier(0.32, 1, 0.24, 1); }
        .main-card { 
            background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
            border-radius: 30px; padding: 40px 25px; 
            border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; overflow: hidden;
        }

        .type-tag { font-size: 11px; font-weight: 800; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.5px; }
        .amount { font-size: 44px; font-weight: 900; margin: 12px 0; letter-spacing: -1.5px; }

        .status-pill { 
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 50px; 
            font-size: 11px; font-weight: 900; text-transform: uppercase;
        }
        .PENDING .status-pill { background: rgba(255, 204, 0, 0.15); color: var(--ios-yellow); }
        .SUCCESS .status-pill, .COMPLETED .status-pill, .APPROVED .status-pill { background: rgba(52, 199, 89, 0.15); color: var(--ios-green); }
        .FAILED .status-pill, .REJECTED .status-pill { background: rgba(255, 59, 48, 0.15); color: var(--ios-red); }

        .timeline { margin: 35px 0 20px; position: relative; padding-left: 35px; text-align: left; }
        .timeline::before { content: ""; position: absolute; left: 15px; top: 5px; bottom: 5px; width: 2px; background: rgba(255,255,255,0.05); }
        .p-bar { position: absolute; left: 15px; top: 5px; width: 2px; background: var(--ios-green); height: 0; transition: 1.5s ease-out; }
        
        .step { position: relative; margin-bottom: 25px; opacity: 0.2; transition: 0.5s; }
        .step.active { opacity: 1; }
        .step::after { 
            content: ""; position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; 
            border-radius: 50%; background: #1c1c1e; border: 2px solid #3a3a3c; z-index: 2; 
        }
        .step.active::after { background: var(--ios-green); border-color: var(--ios-green); box-shadow: 0 0 10px var(--ios-green); }
        
        .step-t { font-size: 13px; font-weight: 700; color: #fff; display: block; }
        .step-d { font-size: 11px; color: #8e8e93; }

        .info-box { background: rgba(255,255,255,0.04); border-radius: 24px; padding: 22px; margin-top: 25px; display: grid; gap: 16px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; }
        .label { color: #8e8e93; font-size: 12px; font-weight: 600; }
        .value { color: #fff; font-size: 13px; font-weight: 700; text-align: right; }

        .bouncy { transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .bouncy:active { transform: scale(0.92); opacity: 0.7; }

        @keyframes iosPop { 0% { transform: scale(0.96); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #download-btn { display: none; }
        #toast { 
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); color: black; padding: 14px 28px; 
            border-radius: 50px; font-size: 13px; font-weight: 600; 
            display: none; z-index: 1000;
        }
    </style>
</head>
<body id="main-body">

    <div class="bg-glow"></div>
    <div id="toast"></div>

    <div id="print-template">
        <div class="t-glow"></div>
        <div id="t-status" class="t-status">---</div>
        <div id="t-amt" class="t-amt">₦0.00</div>
        <div id="t-date" class="t-date">Date: ---</div>
        <div id="t-ref" class="t-ref">Ref: ---</div>
        <div style="position:absolute; bottom:30px; width:100%; text-align:center; font-size:10px; color:#aaa; font-weight:700;">
            OFFICIAL DIGITAL RECEIPT • AVIATOR GENIUS
        </div>
    </div>

    <div class="header">
        <div class="back-btn bouncy" onclick="history.back()">
            <i class="fa-solid fa-chevron-left"></i> Transaction
        </div>
        <div id="download-btn" class="bouncy" onclick="downloadReceipt()" style="padding: 10px;">
            <i class="fa-solid fa-file-arrow-down" style="color: var(--ios-blue); font-size: 20px;"></i>
        </div>
    </div>

    <div class="receipt-container">
        <div class="main-card">
            <div id="det-type" class="type-tag">---</div>
            <div id="det-amt" class="amount">₦0.00</div>
            <div id="status-container">
                <div id="det-status" class="status-pill">FETCHING</div>
            </div>

            <div id="withdraw-flow" style="display:none;">
                <div class="timeline" id="timeline-box">
                    <div class="p-bar" id="p-line"></div>
                    <div class="step" id="s1"><span class="step-t">Request Placed</span><span class="step-d">Instruction received</span></div>
                    <div class="step" id="s2"><span class="step-t">Processing</span><span class="step-d">Provider confirmation</span></div>
                    <div class="step" id="s3"><span class="step-t">Completed</span><span class="step-d">Fully settled</span></div>
                </div>
                <div id="reject-view" style="display:none; padding-top:20px;">
                    <i class="fa-solid fa-circle-xmark" style="font-size:48px; color:var(--ios-red);"></i>
                    <h3>FAILED</h3>
                </div>
            </div>

            <div class="info-box" id="info-grid"></div>

            <div style="margin-top: 35px; font-size: 10px; color: #555; font-weight: 800; letter-spacing: 1px;">
                <i class="fa-solid fa-shield-halved"></i> SECURED BY AVIATOR GENIUS
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tid = urlParams.get('id');
        const type = urlParams.get('type');
        let currentItem = null;

        window.onload = async function() {
            if(!tid || !type) return;
            const _supa = getClient();
            const { data: item } = await _supa.from(type).select('*').eq('id', tid).single();
            if (item) {
                currentItem = item;
                render(item);
            }
        };

        function render(item) {
            const status = (item.status || 'PENDING').toUpperCase();
            document.body.classList.add(status);
            
            const pt = document.getElementById('print-template');
            pt.classList.remove('APPROVED-BG', 'REJECTED-BG');

            if (status !== 'PENDING') {
                document.getElementById('download-btn').style.display = 'block';
                // Apply design to template
                if (['SUCCESS', 'COMPLETED', 'APPROVED'].includes(status)) {
                    pt.classList.add('APPROVED-BG');
                } else {
                    pt.classList.add('REJECTED-BG');
                }
            }
            
            let displayVal = item.amount;
            if ((status === 'REJECTED' || status === 'FAILED') && item.original_amount) {
                displayVal = item.original_amount;
            }
            
            const formattedAmt = `₦${parseFloat(displayVal).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('det-amt').innerText = formattedAmt;
            document.getElementById('det-status').innerHTML = `<i class="fa-solid fa-circle" style="font-size:7px;"></i> ${status}`;
            document.getElementById('det-type').innerText = type === 'deposits' ? 'Refuel Receipt' : 'Payout Receipt';

            const dateStr = new Date(item.created_at).toLocaleString('en-NG', {
                day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            const grid = document.getElementById('info-grid');
            let rows = `
                <div class="info-row"><span class="label">Date</span><span class="value">${dateStr}</span></div>
                <div class="info-row"><span class="label">Reference ID</span><span class="value">#${item.id.toString().slice(-10).toUpperCase()}</span></div>
            `;
            
            if (type === 'withdrawals') {
                document.getElementById('withdraw-flow').style.display = 'block';
                rows += `<div class="info-row"><span class="label">Bank</span><span class="value">${item.bank_name}</span></div>`;
                setTimeout(() => updateTimeline(status), 300);
            }
            grid.innerHTML = rows;

            // Fill Print Template
            document.getElementById('t-amt').innerText = formattedAmt;
            document.getElementById('t-date').innerText = `Date: ${dateStr}`;
            document.getElementById('t-ref').innerText = `Ref: #${item.id.toString().slice(-10).toUpperCase()}`;
            document.getElementById('t-status').innerText = status;
        }

        async function downloadReceipt() {
            showToast("Designing Receipt...");
            const template = document.getElementById('print-template');

            try {
                const canvas = await html2canvas(template, {
                    scale: 3,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: "#ffffff"
                });

                const link = document.createElement('a');
                link.download = `Aviator-Genius-Receipt-${currentItem.id.toString().slice(-6)}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                showToast("Receipt Saved!");
            } catch (err) {
                showToast("Design failed");
            }
        }

        function updateTimeline(status) {
            const line = document.getElementById('p-line');
            if (status === 'REJECTED' || status === 'FAILED') {
                document.getElementById('timeline-box').style.display = 'none';
                document.getElementById('reject-view').style.display = 'block';
            } else {
                document.getElementById('s1').classList.add('active');
                document.getElementById('s2').classList.add('active');
                if (['SUCCESS', 'COMPLETED', 'APPROVED'].includes(status)) {
                    document.getElementById('s3').classList.add('active');
                    line.style.height = '100%';
                } else {
                    line.style.height = '50%';
                }
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 2500);
        }
    </script>
</body>
</html>
