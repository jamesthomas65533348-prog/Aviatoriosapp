<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - Aviator Genius</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>

    <style>
        :root { 
            --primary: #007aff; 
            --bg-dark: #000000; 
            --card-bg: rgba(28, 28, 30, 0.9); 
            --input-border: rgba(255, 255, 255, 0.1);
            --error: #ff453a; 
            --success: #32d74b; 
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }
        input { user-select: auto !important; -webkit-user-select: auto !important; }

        body { 
            background: var(--bg-dark);
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .bg-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.12) 0%, transparent 70%);
            z-index: -1; top: -5%; left: -5%;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 45px 25px; border-radius: 40px; 
            width: 90%; max-width: 370px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            animation: iosReveal 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(1.05) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 15px; color: #8e8e93; margin: 10px 0 35px; }

        /* --- iOS GROUPED LIST STYLE --- */
        .input-list {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px; overflow: hidden; margin-bottom: 25px;
            border: 0.5px solid var(--input-border);
        }

        .input-group { 
            position: relative; border-bottom: 0.5px solid var(--input-border);
            display: flex; align-items: center; padding: 0 15px;
        }
        .input-group:last-child { border-bottom: none; }
        .input-group i:not(.eye-icon) { color: var(--primary); font-size: 1rem; width: 25px; }
        
        input { 
            flex: 1; padding: 18px 10px; background: transparent; border: none;
            color: white; font-size: 17px; outline: none;
        }

        .eye-btn {
            padding: 10px; color: #8e8e93; cursor: pointer; transition: 0.2s;
        }
        .eye-btn.active { color: var(--primary); }

        .login-btn { 
            width: 100%; height: 56px; background: var(--primary); 
            color: white; border: none; border-radius: 14px; 
            font-size: 17px; font-weight: 600; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .login-btn:active { transform: scale(0.96); opacity: 0.8; }

        /* --- LOADER --- */
        .loader { display: none; gap: 5px; align-items: center; }
        .dot { 
            width: 7px; height: 7px; background: white; border-radius: 50%; 
            animation: bounce 0.6s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { opacity: 0.3; transform: translateY(0); } to { opacity: 1; transform: translateY(-6px); } }

        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            padding: 14px 24px; border-radius: 50px; z-index: 10000; 
            font-weight: 600; font-size: 15px; color: white;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap;
        }
        #toast.show { top: 60px; }

        .footer-link { margin-top: 30px; font-size: 15px; color: #8e8e93; cursor: pointer; }
        .footer-link b { color: var(--primary); font-weight: 500; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>
    <div id="toast"></div>

    <div class="card">
        <h2>Genius Login</h2>
        <p class="subtitle">Enter your flight credentials</p>

        <div class="input-list">
            <div class="input-group">
                <i class="fa-solid fa-user-ninja"></i>
                <input type="email" id="login-email" placeholder="Email Address">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="login-pass" placeholder="Password">
                <div class="eye-btn" onclick="togglePassword()">
                    <i class="fa-solid fa-eye" id="eyeIcon"></i>
                </div>
            </div>
        </div>

        <button id="btn" class="login-btn" onclick="handleLogin()">
            <span id="btn-text">Start Session</span>
            <div id="btn-loader" class="loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </button>
        
        <p class="footer-link" onclick="location.href='signup.html'">
            New pilot? <b>Create Account</b>
        </p>
    </div>

    <script>
        var _supa;
        window.onload = function() { _supa = getClient(); };

        function togglePassword() {
            var input = document.getElementById('login-pass');
            var icon = document.getElementById('eyeIcon');
            var btn = icon.parentElement;

            if (input.type === "password") {
                input.type = "text";
                icon.className = "fa-solid fa-eye-slash";
                btn.classList.add('active');
            } else {
                input.type = "password";
                icon.className = "fa-solid fa-eye";
                btn.classList.remove('active');
            }
        }

        function showToast(msg, isSuccess) {
            const t = document.getElementById('toast');
            t.innerHTML = isSuccess ? `<i class="fa-solid fa-circle-check"></i> ${msg}` : `<i class="fa-solid fa-circle-xmark"></i> ${msg}`;
            t.style.background = isSuccess ? "rgba(52, 215, 75, 0.95)" : "rgba(255, 69, 58, 0.95)";
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        function resetBtn() {
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            btn.disabled = false;
            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
        }

        async function handleLogin() {
            var email = document.getElementById('login-email').value.trim();
            var pass = document.getElementById('login-pass').value;
            var btnText = document.getElementById('btn-text');
            var btnLoader = document.getElementById('btn-loader');
            var btn = document.getElementById('btn');

            if (!email || !pass) return showToast("Required fields missing", false);

            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'flex';

            try {
                const { data, error } = await _supa
                    .from('profiles')
                    .select('*')
                    .eq('email', email)
                    .eq('password', pass)
                    .maybeSingle();

                if (error || !data) {
                    showToast("Invalid Credentials", false);
                    resetBtn();
                    return;
                }

                if (data.otp_status === 'PENDING') {
                    showToast("Account Not Verified", false);
                    resetBtn();
                    return;
                }

                showToast("Access Granted!", true);
                localStorage.setItem('user_email', data.email);
                localStorage.setItem('user_id', data.id);
                
                setTimeout(() => { location.href='index.html'; }, 1500);

            } catch (err) {
                showToast("Server Offline", false);
                resetBtn();
            }
        }
    </script>
</body>
</html>
