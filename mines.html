<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mines - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: rgba(28, 28, 30, 0.7);
            --ios-blue: #0A84FF;
            --ios-green: #32D74B;
            --ios-red: #FF453A;
            --ios-gold: #FFD60A;
            --ios-gray: #8E8E93;
            --snap-bounce: cubic-bezier(0.32, 2, 0.55, 0.27);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background-color: var(--ios-bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
            padding-top: env(safe-area-inset-top);
            overflow-x: hidden;
        }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { background: #1c1c1e; padding: 30px; border-radius: 32px; width: 85%; max-width: 320px; text-align: center; border: 0.5px solid rgba(255,255,255,0.1); }

        .bouncy { transition: transform 0.2s var(--snap-bounce); }
        .bouncy:active { transform: scale(0.92); }

        /* --- iOS TOAST --- */
        #custom-toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 10000;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.6s var(--snap-bounce);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #custom-toast.show { top: 60px; }

        /* --- HEADER --- */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            width: 42px; height: 42px;
            background: var(--ios-card);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .balance-pill {
            background: #1c1c1e;
            padding: 8px 18px;
            border-radius: 20px;
            border: 0.5px solid rgba(50, 215, 75, 0.4);
            font-weight: 700;
            color: var(--ios-green);
        }

        /* --- GRID --- */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1/1;
            margin-bottom: 30px;
        }

        .tile {
            background: #1c1c1e;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            border: 0.5px solid rgba(255,255,255,0.08);
            transition: 0.3s var(--snap-bounce);
        }

        .tile.safe { background: linear-gradient(135deg, #32d74b, #28a745); color: #000; box-shadow: 0 0 20px rgba(50, 215, 75, 0.5); border: none; }
        .tile.bomb { background: linear-gradient(135deg, #ff453a, #c0392b); color: white; box-shadow: 0 0 20px rgba(255, 69, 58, 0.5); border: none; }
        .tile.disabled { pointer-events: none; opacity: 0.3; }

        /* --- CONTROLS --- */
        .controls-card {
            width: 100%;
            max-width: 360px;
            background: var(--ios-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 32px;
            border: 0.5px solid rgba(255,255,255,0.12);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .label { font-size: 11px; font-weight: 700; color: var(--ios-gray); text-transform: uppercase; letter-spacing: 0.5px; }

        .ios-input-box {
            background: rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }

        .select-trigger {
            background: rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 600;
        }

        /* --- BOTTOM SHEET --- */
        .trap-options {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1c1c1e;
            border-radius: 25px 25px 0 0;
            padding: 20px; padding-bottom: 40px;
            z-index: 2000;
            display: none; flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            animation: slideUp 0.4s var(--snap-bounce);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .option { padding: 18px; font-weight: 600; border-bottom: 0.5px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .option.active { color: var(--ios-blue); }

        .btn-ios { padding: 18px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-gold { background: var(--ios-gold); color: black; }

        .history-section { width: 100%; max-width: 360px; margin-top: 30px; }
        .history-row {
            background: rgba(255,255,255,0.03); margin-bottom: 8px;
            padding: 14px 20px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div id="custom-toast"></div>

    <div class="modal-overlay" id="sessionModal">
        <div class="modal-card">
            <i class="fa-solid fa-shield-virus" style="font-size: 3rem; color: var(--ios-red); margin-bottom: 15px;"></i>
            <h3 style="margin-bottom: 10px;">Session Expired</h3>
            <p style="color: var(--ios-gray); font-size: 14px; margin-bottom: 20px;">Logged in on another device. Play session terminated.</p>
            <button class="btn-ios btn-blue bouncy" style="width: 100%;" onclick="confirmLogout()">Back to Login</button>
        </div>
    </div>

    <div class="header">
        <div class="back-btn bouncy" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="balance-pill">₦ <span id="user-balance">0.00</span></div>
    </div>

    <div class="mines-grid" id="grid"></div>

    <div class="controls-card">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div>
                <p class="label">Stake</p>
                <input type="number" id="bet-amount" class="ios-input-box" value="100">
            </div>
            <div>
                <p class="label">Difficulty</p>
                <div class="select-trigger bouncy" id="trap-trigger" onclick="toggleTraps()">
                    <span id="current-traps">3 TRAPS</span>
                    <i class="fa-solid fa-chevron-up" style="font-size: 10px; opacity: 0.5;"></i>
                </div>
            </div>
        </div>

        <button id="btn-bet" class="btn-ios btn-blue bouncy" onclick="startGame()">DEPLOY MISSION</button>
        <button id="btn-cashout" class="btn-ios btn-gold bouncy" style="display:none;" onclick="cashOut()">CASHOUT</button>
        <button id="btn-retry" class="btn-ios bouncy" style="display:none; background:#2c2c2e; color:white;" onclick="resetGame()">NEW MISSION</button>
    </div>

    <div class="trap-options" id="trap-options">
        <p class="label" style="text-align: center; margin-bottom: 10px;">Select Mine Count</p>
        <div class="option active bouncy" onclick="setTraps(3)"><span>3 TRAPS</span><i class="fa-solid fa-bomb"></i></div>
        <div class="option bouncy" onclick="setTraps(4)"><span>4 TRAPS</span><i class="fa-solid fa-bomb"></i></div>
        <div class="option bouncy" onclick="setTraps(5)"><span>5 TRAPS</span><i class="fa-solid fa-bomb"></i></div>
        <div class="option bouncy" onclick="setTraps(6)"><span>6 TRAPS</span><i class="fa-solid fa-bomb"></i></div>
        <div class="option bouncy" onclick="setTraps(7)"><span>7 TRAPS</span><i class="fa-solid fa-bomb"></i></div>
        <button class="btn-ios bouncy" style="margin-top: 15px; background: #3a3a3c; color: white;" onclick="toggleTraps()">Close</button>
    </div>

    <div class="history-section" id="history-list"></div>

    <script>
        const _supa = getClient();
        const myEmail = localStorage.getItem('user_email');
        const localSessId = localStorage.getItem('my_session_id');

        let userBalance = 0, betAmount = 0, mines = [], revealedCount = 0, currentMultiplier = 1, gameActive = false, trapCount = 3;

        window.onload = async () => {
            if(!myEmail) { location.href = 'login.html'; return; }
            await fetchBalance();
            await loadHistory();
            createGrid();
            setInterval(fetchBalance, 5000); // Continuous session monitoring
        };

        function showToast(msg, type = 'info') {
            const t = document.getElementById('custom-toast');
            t.innerHTML = `<i class="fa-solid fa-bolt" style="color:${type==='error'?'var(--ios-red)':'var(--ios-green)'}"></i> ${msg}`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function fetchBalance() {
            const { data } = await _supa.from('profiles').select('*').eq('email', myEmail).single();
            if (data) {
                // SESSION GUARD
                if (data.current_session_id && data.current_session_id !== localSessId) {
                    document.getElementById('sessionModal').style.display = 'flex';
                    return;
                }
                userBalance = parseFloat(data.balance); 
                updateUI(); 
            }
        }

        async function startGame() {
            betAmount = parseFloat(document.getElementById('bet-amount').value);
            if (isNaN(betAmount) || betAmount < 100) return showToast("Min stake: ₦100", "error");
            
            const btn = document.getElementById('btn-bet');
            btn.disabled = true;

            // Use the Secure RPC call
            const { data, error } = await _supa.rpc('secure_bet', { 
                amount_to_bet: betAmount, 
                user_email: myEmail 
            });

            if (error || !data || data[0].success === false) {
                btn.disabled = false;
                return showToast(error ? "System Error" : "Insufficient Funds", "error");
            }

            userBalance = parseFloat(data[0].new_balance);
            updateUI();

            document.getElementById('bet-amount').disabled = true;
            document.getElementById('trap-trigger').style.opacity = '0.5';
            
            gameActive = true; 
            revealedCount = 0; 
            currentMultiplier = 1; 
            mines = [];

            while(mines.length < trapCount) {
                let r = Math.floor(Math.random() * 25);
                if(!mines.includes(r)) mines.push(r);
            }

            document.getElementById('btn-bet').style.display = 'none';
            document.getElementById('btn-cashout').style.display = 'block';
            document.getElementById('btn-cashout').innerText = `CASHOUT ₦${betAmount.toFixed(2)}`;
            
            document.querySelectorAll('.tile').forEach(t => { 
                t.className = 'tile bouncy'; 
                t.innerHTML = ''; 
            });
        }

        async function cashOut() {
            if(!gameActive) return;
            const win = betAmount * currentMultiplier;
            const newTotal = userBalance + win;
            
            const { error } = await _supa.from('profiles').update({ balance: newTotal }).eq('email', myEmail);
            
            if(!error) {
                userBalance = newTotal;
                updateUI();
                showToast(`Earned ₦${win.toFixed(2)}!`);
                await endGame(true);
            }
        }

        async function endGame(isWin) {
            gameActive = false;
            if(!isWin) showToast("Mission Failed!", "error");

            await _supa.from('mines_history').insert([{
                user_email: myEmail, 
                bet_amount: betAmount, 
                multiplier: isWin ? currentMultiplier.toFixed(2) : "0.00",
                payout: isWin ? (betAmount * currentMultiplier) : 0,
                status: isWin ? 'win' : 'loss'
            }]);

            document.getElementById('btn-cashout').style.display = 'none';
            document.getElementById('btn-retry').style.display = 'block';
            
            mines.forEach(idx => {
                const t = document.querySelector(`[data-index="${idx}"]`);
                t.classList.add('bomb'); 
                t.innerHTML = '<i class="fa-solid fa-bomb"></i>';
            });
            setTimeout(loadHistory, 1000);
        }

        function revealTile(index) {
            if(!gameActive) return;
            const tile = document.querySelector(`[data-index="${index}"]`);
            if(tile.classList.contains('safe')) return;

            if(mines.includes(index)) {
                endGame(false);
            } else {
                revealedCount++;
                tile.classList.add('safe');
                tile.innerHTML = '<i class="fa-solid fa-gem"></i>';
                
                // Calculate multiplier based on probability
                const nextOdds = (25 - (revealedCount - 1)) / (25 - trapCount - (revealedCount - 1));
                currentMultiplier *= nextOdds;
                
                document.getElementById('btn-cashout').innerText = `CASHOUT ₦${(betAmount * currentMultiplier).toFixed(2)}`;
                if(revealedCount === (25 - trapCount)) cashOut();
            }
        }

        function createGrid() {
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile disabled';
                tile.dataset.index = i;
                tile.onclick = () => revealTile(i);
                gridContainer.appendChild(tile);
            }
        }

        function toggleTraps() {
            if(gameActive) return;
            const options = document.getElementById('trap-options');
            options.style.display = (options.style.display === 'flex') ? 'none' : 'flex';
        }

        function setTraps(n) {
            trapCount = n;
            document.getElementById('current-traps').innerText = n + ' TRAPS';
            document.querySelectorAll('.option').forEach((opt, idx) => {
                opt.classList.toggle('active', [3,4,5,6,7][idx] === n);
            });
            toggleTraps();
        }

        function resetGame() {
            document.getElementById('bet-amount').disabled = false;
            document.getElementById('trap-trigger').style.opacity = '1';
            document.getElementById('btn-retry').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            document.getElementById('btn-bet').disabled = false;
            createGrid();
        }

        function updateUI() {
            document.getElementById('user-balance').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        async function loadHistory() {
            const { data } = await _supa.from('mines_history').select('*').eq('user_email', myEmail).order('created_at', { ascending: false }).limit(4);
            const list = document.getElementById('history-list');
            list.innerHTML = '<p class="label" style="margin-bottom:12px;">LOGS</p>';
            if (data) {
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `history-row`;
                    div.innerHTML = `<span style="font-weight:700; color:${item.status==='win'?'var(--ios-green)':'var(--ios-red)'}">${item.status.toUpperCase()}</span> <b>${item.multiplier}x</b>`;
                    list.appendChild(div);
                });
            }
        }

        function confirmLogout() { localStorage.clear(); location.href = 'login.html'; }
    </script>
</body>
</html>
