<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mines - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
            --bg: #02050a;
            --card: #0d1930;
            --tile: #16243d;
            --success: #00ff88;
            --danger: #ff3366;
            --gold: #fbbf24;
            --spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        /* --- MODERN RESET --- */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            outline: none;
        }
        input { user-select: auto !important; -webkit-user-select: auto !important; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0d1930 0%, #02050a 100%);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- STYLISH TOAST --- */
        #custom-toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 25, 48, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            z-index: 10000;
            font-weight: 800;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: 0.6s var(--spring);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #custom-toast.show { top: 30px; }

        /* --- HEADER --- */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
        }

        .balance-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            font-weight: 900;
            color: var(--success);
        }

        /* --- MINES GRID --- */
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1/1;
            margin: 15px 0;
        }

        .tile {
            background: var(--tile);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
            overflow: hidden;
            transition: 0.3s var(--spring);
        }

        .tile:active { transform: scale(0.8); }

        .tile::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-20deg);
            animation: globalShine 5s infinite;
        }

        @keyframes globalShine { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        .tile.pop { animation: bounceIn 0.5s var(--spring); }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }

        .tile.safe { background: var(--success); color: #000; box-shadow: 0 0 25px var(--success); border: none; }
        .tile.bomb { background: var(--danger); color: white; box-shadow: 0 0 25px var(--danger); border: none; }
        .tile.disabled { pointer-events: none; opacity: 0.3; }

        /* --- CONTROLS & SYSTEM SELECT --- */
        .controls {
            width: 100%;
            max-width: 360px;
            background: rgba(22, 36, 61, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group label { font-size: 0.7rem; color: #8492a6; font-weight: 800; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        
        .system-input {
            background: #02050a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            width: 100%;
        }

        /* The Nice Dropdown */
        .system-select-wrapper { position: relative; width: 100%; }
        
        .system-select-trigger {
            background: #02050a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .system-select-trigger:active { transform: scale(0.96); }

        .system-options {
            position: absolute;
            bottom: 120%;
            left: 0;
            width: 100%;
            background: rgba(13, 25, 48, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            z-index: 100;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s var(--spring);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .option {
            padding: 14px;
            font-weight: 700;
            color: #8492a6;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .option:hover, .option.active { background: rgba(0, 123, 255, 0.1); color: white; }

        .btn-main {
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s var(--spring);
        }

        .btn-bet { background: linear-gradient(135deg, var(--primary), #0056b3); color: white; box-shadow: 0 10px 20px rgba(0, 123, 255, 0.3); }
        .btn-cashout { background: linear-gradient(135deg, var(--gold), #d97706); color: black; display: none; }
        .btn-bet:active { transform: scale(0.92); }

        /* --- HISTORY --- */
        .history { width: 100%; max-width: 360px; margin-top: 25px; }
        .history-item {
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
            padding: 12px 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #1e2f4d;
        }
    </style>
</head>
<body>

    <div id="custom-toast"></div>

    <div class="header">
        <i class="fa-solid fa-chevron-left" style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 50%;" onclick="history.back()"></i>
        <div class="balance-card">₦ <span id="user-balance">0.00</span></div>
    </div>

    <div class="mines-grid" id="grid"></div>

    <div class="controls">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="input-group">
                <label>STAKE</label>
                <input type="number" id="bet-amount" class="system-input" value="100">
            </div>
            <div class="input-group">
                <label>TRAPS</label>
                <div class="system-select-wrapper">
                    <div class="system-select-trigger" id="trap-trigger" onclick="toggleTraps()">
                        <span id="current-traps">3 TRAPS</span>
                        <i class="fa-solid fa-angle-up"></i>
                    </div>
                    <div class="system-options" id="trap-options">
                        <div class="option active" onclick="setTraps(3)"><span>3 TRAPS</span> <i class="fa-solid fa-bomb"></i></div>
                        <div class="option" onclick="setTraps(4)"><span>4 TRAPS</span> <i class="fa-solid fa-bomb"></i></div>
                        <div class="option" onclick="setTraps(5)"><span>5 TRAPS</span> <i class="fa-solid fa-bomb"></i></div>
                        <div class="option" onclick="setTraps(6)"><span>6 TRAPS</span> <i class="fa-solid fa-bomb"></i></div>
                        <div class="option" onclick="setTraps(7)"><span>7 TRAPS</span> <i class="fa-solid fa-bomb"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <button id="btn-bet" class="btn-main btn-bet" onclick="startGame()">DEPLOY MISSION</button>
        <button id="btn-cashout" class="btn-main btn-cashout" onclick="cashOut()">CASHOUT</button>
        <button id="btn-retry" class="btn-main btn-retry" onclick="resetGame()" style="display:none; background:#1e2f4d; color:white;">NEW MISSION</button>
    </div>

    <div class="history" id="history-list"></div>

    <script>
        const _supa = getClient();
        const myEmail = localStorage.getItem('user_email');
        
        let userBalance = 0, betAmount = 0, mines = [], revealedCount = 0, currentMultiplier = 1, gameActive = false, trapCount = 3;

        window.onload = async () => {
            if(!myEmail) { location.href = 'login.html'; return; }
            await fetchBalance();
            await loadHistory();
            createGrid();
            // Critical check for unfinished games on reload
            checkUnfinishedGame(); 
        };

        // --- PERSISTENCE LOGIC ---
        function saveGameState() {
            const state = {
                active: gameActive,
                bet: betAmount
            };
            localStorage.setItem('mines_active_game', JSON.stringify(state));
        }

        function clearGameState() {
            localStorage.removeItem('mines_active_game');
        }

        async function checkUnfinishedGame() {
            const saved = localStorage.getItem('mines_active_game');
            if (saved) {
                const state = JSON.parse(saved);
                if(state.active) {
                    showToast("Previous bet refunded", "info");
                    // Refund the stake back to the local variable and DB
                    await updateDatabaseBalance(userBalance + state.bet);
                    clearGameState();
                    resetGame();
                }
            }
        }

        // --- CUSTOM SELECT LOGIC ---
        function toggleTraps() {
            if(gameActive) return;
            const options = document.getElementById('trap-options');
            const isVisible = options.style.display === 'flex';
            options.style.display = isVisible ? 'none' : 'flex';
        }

        function setTraps(n) {
            trapCount = n;
            document.getElementById('current-traps').innerText = n + ' TRAPS';
            document.getElementById('trap-options').style.display = 'none';
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        document.addEventListener('click', (e) => {
            if (!document.querySelector('.system-select-wrapper').contains(e.target)) {
                document.getElementById('trap-options').style.display = 'none';
            }
        });

        // --- CORE GAME LOGIC ---
        function showToast(msg, type = 'info') {
            const t = document.getElementById('custom-toast');
            t.innerHTML = `<i class="fa-solid fa-bolt" style="color:${type==='error'?'var(--danger)':'var(--success)'}"></i> ${msg}`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function fetchBalance() {
            const { data } = await _supa.from('profiles').select('balance').eq('email', myEmail).single();
            if (data) { userBalance = parseFloat(data.balance); updateUI(); }
        }

        async function updateDatabaseBalance(amount) {
            await _supa.from('profiles').update({ balance: amount }).eq('email', myEmail);
            userBalance = amount; updateUI();
        }

        async function loadHistory() {
            const { data } = await _supa.from('mines_history').select('*').eq('user_email', myEmail).order('created_at', { ascending: false }).limit(4);
            const list = document.getElementById('history-list');
            list.innerHTML = '<label style="font-size:0.65rem; color:#64748b; font-weight:900; margin-bottom:10px; display:block;">LOGS</label>';
            if (data) {
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `history-item`;
                    div.innerHTML = `<span style="font-weight:800; color:${item.status==='win'?'var(--success)':'var(--danger)'}">${item.status.toUpperCase()}</span> <b>${item.multiplier}x</b>`;
                    list.appendChild(div);
                });
            }
        }

        function createGrid() {
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile disabled';
                tile.dataset.index = i;
                tile.onclick = () => revealTile(i);
                gridContainer.appendChild(tile);
            }
        }

        async function startGame() {
            betAmount = parseFloat(document.getElementById('bet-amount').value);
            if (isNaN(betAmount) || betAmount < 100) return showToast("Min stake: ₦100", "error");
            if (betAmount > userBalance) return showToast("Insufficient Funds", "error");

            document.getElementById('bet-amount').disabled = true;
            document.getElementById('trap-trigger').style.opacity = '0.5';
            await updateDatabaseBalance(userBalance - betAmount);
            
            gameActive = true; revealedCount = 0; currentMultiplier = 1; mines = [];
            while(mines.length < trapCount) {
                let r = Math.floor(Math.random() * 25);
                if(!mines.includes(r)) mines.push(r);
            }

            // Save the state immediately after the balance deduction
            saveGameState();

            document.getElementById('btn-bet').style.display = 'none';
            document.getElementById('btn-cashout').style.display = 'block';
            document.getElementById('btn-cashout').innerText = `CASHOUT ₦${betAmount.toFixed(2)}`;
            document.querySelectorAll('.tile').forEach(t => { t.className = 'tile'; t.innerHTML = ''; });
        }

        function revealTile(index) {
            if(!gameActive) return;
            const tile = document.querySelector(`[data-index="${index}"]`);
            if(tile.classList.contains('safe')) return;

            tile.classList.add('pop');
            if(mines.includes(index)) {
                endGame(false);
            } else {
                revealedCount++;
                tile.classList.add('safe');
                tile.innerHTML = '<i class="fa-solid fa-gem"></i>';
                const nextOdds = (25 - (revealedCount - 1)) / (25 - trapCount - (revealedCount - 1));
                currentMultiplier *= nextOdds;
                document.getElementById('btn-cashout').innerText = `CASHOUT ₦${(betAmount * currentMultiplier).toFixed(2)}`;
                if(revealedCount === (25 - trapCount)) cashOut();
            }
        }

        async function cashOut() {
            if(!gameActive) return;
            const win = betAmount * currentMultiplier;
            await updateDatabaseBalance(userBalance + win);
            showToast(`Earned ₦${win.toFixed(2)}!`);
            await endGame(true);
        }

        async function endGame(isWin) {
            gameActive = false;
            // Clear persistence flag so refund won't trigger
            clearGameState(); 

            if(!isWin) showToast("Mission Failed!", "error");
            await _supa.from('mines_history').insert([{
                user_email: myEmail, bet_amount: betAmount, 
                multiplier: isWin ? currentMultiplier.toFixed(2) : "0.00",
                payout: isWin ? (betAmount * currentMultiplier) : 0,
                status: isWin ? 'win' : 'loss'
            }]);
            document.getElementById('btn-cashout').style.display = 'none';
            document.getElementById('btn-retry').style.display = 'block';
            mines.forEach(idx => {
                const t = document.querySelector(`[data-index="${idx}"]`);
                t.classList.add('bomb'); t.innerHTML = '<i class="fa-solid fa-bomb"></i>';
            });
            setTimeout(loadHistory, 1000);
        }

        function resetGame() {
            document.getElementById('bet-amount').disabled = false;
            document.getElementById('trap-trigger').style.opacity = '1';
            document.getElementById('btn-retry').style.display = 'none';
            document.getElementById('btn-bet').style.display = 'block';
            createGrid();
        }

        function updateUI() {
            document.getElementById('user-balance').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>
