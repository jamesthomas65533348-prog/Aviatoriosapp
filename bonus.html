<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bonus - Aviator Genius</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-grey: #8e8e93;
            --ios-green: #34c759;
            --ios-gold: #ffcc00;
            --bounce-transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            box-sizing: border-box;
        }

        body { 
            background: var(--ios-bg);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- BOUNCY --- */
        .bouncy { 
            transition: var(--bounce-transition), opacity 0.2s ease; 
            cursor: pointer;
        }
        .bouncy:active { transform: scale(0.94); opacity: 0.8; }

        /* --- RADAR ANIMATION --- */
        .radar-box {
            position: relative; width: 120px; height: 120px;
            margin-bottom: 30px; display: flex; align-items: center; justify-content: center;
        }

        .radar-ring {
            position: absolute; inset: 0;
            border: 2px solid var(--ios-blue); border-radius: 50%;
            animation: radarRipple 3s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
        }
        .radar-ring:nth-child(2) { animation-delay: 1s; }
        .radar-ring:nth-child(3) { animation-delay: 2s; }

        @keyframes radarRipple {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .bonus-icon {
            font-size: 3.5rem; color: #fff;
            filter: drop-shadow(0 0 20px rgba(0, 122, 255, 0.6));
            z-index: 5;
        }

        /* --- CONTENT CARD --- */
        .glass-card {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; padding: 30px;
            width: 90%; max-width: 380px;
            text-align: center;
            animation: cardSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .main-header {
            font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 10px;
        }

        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(52, 199, 89, 0.15); color: var(--ios-green);
            padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 20px;
        }

        .dot { width: 6px; height: 6px; background: var(--ios-green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .brief-text {
            font-size: 15px; line-height: 1.5; color: var(--ios-grey);
            margin-bottom: 30px; padding: 0 10px;
        }

        .highlight { color: white; font-weight: 600; }

        /* --- BUTTONS --- */
        .btn-ios {
            background: var(--ios-blue); color: white; text-decoration: none;
            display: block; width: 100%; padding: 16px; border-radius: 14px;
            font-size: 17px; font-weight: 600; margin-bottom: 15px;
        }

        .secondary-link {
            color: var(--ios-blue); text-decoration: none;
            font-size: 15px; font-weight: 500; display: inline-block;
            padding: 10px;
        }

        /* --- FOOTER --- */
        .footer-nav {
            position: fixed; bottom: 40px;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .footer-text { font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div class="radar-box">
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <i class="fa-solid fa-gift bonus-icon"></i>
    </div>

    <div class="glass-card">
        <div class="status-pill">
            <div class="dot"></div>
            Syncing Signal Wave
        </div>

        <h1 class="main-header">Signal Detected</h1>
        
        <p class="brief-text">
            The <span class="highlight">Elite Genesis</span> phase has concluded. 
            Calibrating the <span class="highlight">Next-Gen Signal Wave</span>. 
            Scanning your account for priority access...
        </p>

        <a href="index.html" class="btn-ios bouncy">Check Eligibility</a>
        <a href="index.html" class="secondary-link bouncy">Learn More</a>
    </div>

    <div class="footer-nav">
        <a href="index.html" class="secondary-link bouncy" style="font-size: 13px; color: var(--ios-grey);">
            <i class="fa-solid fa-chevron-left"></i> Return Home
        </a>
        <span class="footer-text">SECURE PROTOCOL V4.2</span>
    </div>

    <script>
        // Disable selection and context menu for professional feel
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Add a small vibration/shake if they try to right click (visual only)
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'c')) {
                e.preventDefault();
                document.querySelector('.glass-card').style.animation = 'none';
                document.querySelector('.glass-card').offsetHeight; // trigger reflow
                document.querySelector('.glass-card').style.animation = 'shake 0.4s';
            }
        });
    </script>

</body>
</html>
