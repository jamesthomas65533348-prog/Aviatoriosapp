<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Withdraw - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --ios-dark: #000000;
            --card-glass: rgba(28, 28, 30, 0.7);
            --gold: #fbbf24;
            --primary: var(--ios-red);
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            background: var(--ios-dark);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000 70%);
            background-attachment: fixed;
            overflow: hidden;
        }

        .bouncy { transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .bouncy:active { transform: scale(0.92); opacity: 0.8; }

        @keyframes iosPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        /* --- Time Lock UI --- */
        #lock-overlay { position: fixed; inset: 0; background: var(--ios-dark); z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        .big-timer { font-size: 3.5rem; font-weight: 900; font-family: monospace; color: var(--ios-red); margin: 20px 0; text-shadow: 0 0 20px rgba(255, 59, 48, 0.3); }
        .timer-banner { background: rgba(255, 59, 48, 0.1); border-radius: 12px; padding: 10px; font-size: 11px; font-weight: 800; color: var(--ios-red); margin: 0 20px 15px; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(255, 59, 48, 0.2); }

        /* --- Header --- */
        .withdraw-header {
            padding: 50px 20px 15px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .user-badge { font-size: 11px; background: rgba(255,59,48,0.1); padding: 6px 15px; border-radius: 50px; border: 1px solid rgba(255,59,48,0.2); font-weight: 800; color: var(--ios-red); text-transform: uppercase; }

        .balance-container { 
            margin: 20px; padding: 35px 20px; border-radius: 30px; 
            background: linear-gradient(145deg, rgba(255, 59, 48, 0.1), rgba(0, 0, 0, 0.4)); 
            border: 1px solid rgba(255, 59, 48, 0.2); text-align: center;
        }

        .form-section { padding: 0 20px 100px; }
        .input-card { background: var(--card-glass); border-radius: 28px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(15px); }
        
        label { font-size: 11px; color: #8e8e93; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block; padding-left: 5px; }
        
        input { 
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); color: white; outline: none; transition: 0.3s; font-size: 15px; font-weight: 600;
        }
        input:focus { border-color: var(--ios-red); background: rgba(0,0,0,0.5); }

        .custom-select-trigger { 
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; color: #8e8e93; 
        }

        .withdraw-action-btn { 
            width: 100%; padding: 20px; background: var(--ios-red); color: white; 
            border: none; border-radius: 20px; font-weight: 800; font-size: 16px; 
            box-shadow: 0 10px 20px rgba(255, 59, 48, 0.3); position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Saved Bank Items --- */
        .saved-bank-item { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); padding:16px; border-radius:20px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
        .saved-bank-item.active { border-color: var(--ios-red); }
        .delete-bank-btn { color: #8e8e93; padding: 10px; }
        .delete-bank-btn:active { color: var(--ios-red); transform: scale(1.2); }

        .dot-loader { display: none; gap: 5px; }
        .dot-loader div { width: 8px; height: 8px; background: white; border-radius: 50%; animation: dotPulse 1.4s infinite ease-in-out both; }
        @keyframes dotPulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }

        .ios-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .glass-panel { background: #1c1c1e; padding: 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 350px; text-align: center; animation: iosPop 0.4s cubic-bezier(0.32, 1, 0.24, 1); }

        #bank-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 7000; display: none; align-items: flex-end; }
        .bank-sheet { background: #1c1c1e; width: 100%; max-height: 75vh; border-radius: 30px 30px 0 0; border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.32, 1, 0.24, 1); }

        .search-box { margin: 15px 20px; padding: 12px 15px; background: rgba(0,0,0,0.3); border-radius: 14px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .search-box input { border: none !important; padding: 0; font-size: 14px; background: transparent; }

        .verify-tag { font-size: 11px; margin-top: 10px; padding: 12px; border-radius: 12px; font-weight: 700; text-align: center; display: none; animation: iosPop 0.3s ease; }
        .v-loading { color: var(--gold); background: rgba(251, 191, 36, 0.1); }
        .v-success { color: var(--ios-green); background: rgba(52, 199, 89, 0.1); }
        .v-error { color: var(--ios-red); background: rgba(255, 59, 48, 0.1); }

        #toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; display: none; z-index: 10000; font-weight: 700; font-size: 13px; backdrop-filter: blur(25px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="lock-overlay">
        <i class="fa-solid fa-clock-four" style="font-size: 4rem; color: #1c1c1e; margin-bottom: 20px;"></i>
        <h2 style="margin:0; font-weight: 900;">VAULT CLOSED</h2>
        <p style="color: #8e8e93; font-size: 13px; margin-top: 10px;">Withdrawals open daily 08:00 - 21:00</p>
        <div class="big-timer" id="lock-countdown">00:00:00</div>
        <button class="bouncy" onclick="location.href='index.html'" style="background:rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color:#8e8e93; padding:15px 35px; border-radius:20px; font-weight:800; border:none;">EXIT TERMINAL</button>
    </div>

    <div id="bank-sheet-overlay" onclick="toggleBankSheet(false)">
        <div class="bank-sheet" onclick="event.stopPropagation()">
            <div style="width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 15px auto;"></div>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass" style="color: #8e8e93;"></i>
                <input type="text" id="bank-search" placeholder="Search bank..." oninput="filterBanks()">
            </div>
            <div id="bank-list-render" style="overflow-y: auto; padding: 0 20px 40px;"></div>
        </div>
    </div>

    <div id="pin-overlay" class="ios-overlay">
        <div class="glass-panel">
            <i class="fa-solid fa-shield-lock" style="font-size: 45px; color: var(--ios-red); margin-bottom: 20px;"></i>
            <h3 style="margin:0; letter-spacing: -0.5px;">SECURITY CHECK</h3>
            <p style="font-size: 13px; color: #8e8e93; margin: 12px 0 25px;">Enter your 4-digit withdrawal PIN</p>
            <input type="password" id="pin-field" style="text-align:center; font-size:35px; letter-spacing:15px; border:none; background:transparent;" maxlength="4" inputmode="numeric" placeholder="••••">
            <button class="withdraw-action-btn bouncy" id="confirm-pin-btn" style="margin-top:30px;" onclick="confirmPINAction()">
                <span class="btn-text">AUTHORIZE</span>
                <div class="dot-loader" id="pin-loader"><div></div><div></div><div></div></div>
            </button>
            <div onclick="document.getElementById('pin-overlay').style.display='none'" style="margin-top:20px; color:var(--ios-red); font-size:13px; font-weight:700;" class="bouncy">CANCEL</div>
        </div>
    </div>

    <div class="withdraw-header">
        <div class="bouncy" onclick="location.href='index.html'" style="color:var(--ios-red); font-weight:600; display:flex; align-items:center; gap:5px;">
            <i class="fa-solid fa-chevron-left"></i> Back
        </div>
        <div class="user-badge" id="top-name">---</div>
        <div style="width: 45px;"></div>
    </div>

    <div id="withdraw-content" style="overflow-y: auto; height: calc(100vh - 100px);">
        <div class="timer-banner" id="active-timer-banner">
            <i class="fa-solid fa-bolt-lightning" style="color: var(--gold);"></i> SESSION ENDS IN: <span id="active-countdown">--:--:--</span>
        </div>

        <div class="balance-container">
            <div style="font-size: 11px; color: #8e8e93; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px;">Available Payout</div>
            <div style="font-size: 45px; font-weight: 900; letter-spacing: -1px;">₦<span id="current-bal">0.00</span></div>
        </div>

        <div class="form-section">
            <div class="input-card">
                <div id="saved-banks-section" style="display:none; margin-bottom: 25px;">
                    <label>Withdraw to</label>
                    <div id="saved-banks-list"></div>
                    <div style="text-align:center; color:var(--ios-red); font-size:12px; font-weight:700; margin-top:10px;" class="bouncy" onclick="showNewBankForm()">+ Use different account</div>
                </div>

                <div id="new-bank-form">
                    <div style="margin-bottom: 22px;">
                        <label>Target Bank</label>
                        <div class="custom-select-trigger bouncy" onclick="toggleBankSheet(true)">
                            <span id="selected-bank-display">Select Bank</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <input type="hidden" id="bank-name">
                    </div>
                    <div style="margin-bottom: 22px;">
                        <label>Account Number</label>
                        <input type="number" id="acc-num" placeholder="0123456789" oninput="handleAccInput(this)">
                        <div id="verify-status" class="verify-tag"></div>
                    </div>
                </div>

                <div style="margin-bottom: 30px;">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="Min ₦600">
                    <div id="fee-display" style="font-size:11px; color:#8e8e93; margin-top:10px; display:flex; justify-content:space-between; font-weight:600;">
                        <span>Fee (3%): ₦0</span>
                        <span>Net: ₦0</span>
                    </div>
                </div>

                <button class="withdraw-action-btn bouncy" id="main-withdraw-btn" onclick="validateWithdrawal()">
                    <span class="btn-text">WITHDRAW FUNDS</span>
                    <div class="dot-loader" id="main-loader"><div></div><div></div><div></div></div>
                </button>
            </div>
        </div>
    </div>

    <div id="name-reg-overlay" class="ios-overlay">
        <div class="glass-panel">
            <i class="fa-solid fa-circle-user" style="font-size: 50px; color: var(--ios-red); margin-bottom: 15px;"></i>
            <h3 style="margin:0; letter-spacing:-0.5px;">IDENTITY SETUP</h3>
            <p style="font-size: 13px; color: #8e8e93; margin: 12px 0 25px;">Names must match your bank records.</p>
            <input type="text" id="reg-fname" placeholder="First Name" style="margin-bottom:12px;" autocomplete="off">
            <input type="text" id="reg-lname" placeholder="Last Name" autocomplete="off">
            <button class="withdraw-action-btn bouncy" id="reg-name-btn" style="margin-top:25px;" onclick="saveNameToDB()">
                <span class="btn-text">CONTINUE</span>
                <div class="dot-loader"><div></div><div></div><div></div></div>
            </button>
        </div>
    </div>

    <script>
        var _supa;
        var userEmail = localStorage.getItem('user_email');
        var userBalance = 0;
        var savedFullName = "";
        var savedPIN = null;
        var isVerified = false;
        var selectedSavedBank = null;
        var toastTimer = null;

        const bankData = [
            {"Code": "560", "Name": "Page MFBank"}, {"Code": "304", "Name": "Stanbic Mobile Money"},
            {"Code": "308", "Name": "FortisMobile"}, {"Code": "328", "Name": "TagPay"},
            {"Code": "309", "Name": "FBNMobile"}, {"Code": "011", "Name": "First Bank of Nigeria"},
            {"Code": "326", "Name": "Sterling Mobile"}, {"Code": "990", "Name": "Omoluabi Mortgage Bank"},
            {"Code": "311", "Name": "ReadyCash (Parkway)"}, {"Code": "057", "Name": "Zenith Bank"},
            {"Code": "068", "Name": "Standard Chartered Bank"}, {"Code": "306", "Name": "eTranzact"},
            {"Code": "070", "Name": "Fidelity Bank"}, {"Code": "023", "Name": "CitiBank"},
            {"Code": "215", "Name": "Unity Bank"}, {"Code": "323", "Name": "Access Money"},
            {"Code": "305", "Name": "OPay"}, {"Code": "035", "Name": "Wema Bank"},
            {"Code": "058", "Name": "GTBank Plc"}, {"Code": "033", "Name": "United Bank for Africa"},
            {"Code": "044", "Name": "Access Bank"}
        ].sort((a,b) => (a.Name || "").localeCompare(b.Name || ""));

        window.onload = function() {
            _supa = getClient();
            initWithdrawalSystem();
            setInterval(handleTimeRestrictions, 1000);
            document.getElementById('amount').addEventListener('input', updateFeeCalc);
            renderBanks(bankData);
        };

        function toggleBankSheet(show) {
            document.getElementById('bank-sheet-overlay').style.display = show ? 'flex' : 'none';
        }

        function renderBanks(list) {
            const container = document.getElementById('bank-list-render');
            container.innerHTML = list.map(bank => `
                <div style="padding:18px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-weight:600; font-size:15px;" onclick="selectBank('${bank.Code}', '${bank.Name}')">
                    ${bank.Name}
                </div>
            `).join('');
        }

        function filterBanks() {
            const term = document.getElementById('bank-search').value.toLowerCase();
            const filtered = bankData.filter(b => b.Name.toLowerCase().includes(term));
            renderBanks(filtered);
        }

        function selectBank(val, name) {
            document.getElementById('bank-name').value = val;
            document.getElementById('selected-bank-display').innerText = name;
            document.getElementById('selected-bank-display').style.color = "white";
            toggleBankSheet(false);
            if(document.getElementById('acc-num').value.length === 10) checkAccount();
        }

        async function initWithdrawalSystem() {
            let { data } = await _supa.from('profiles').select('*').eq('email', userEmail).single();
            if (data) {
                userBalance = parseFloat(data.balance);
                savedPIN = data.withdrawal_pin;
                document.getElementById('current-bal').innerText = userBalance.toLocaleString(undefined, {minimumFractionDigits:2});
                if (!data.full_name) {
                    document.getElementById('name-reg-overlay').style.display = 'flex';
                } else {
                    savedFullName = data.full_name.toLowerCase();
                    document.getElementById('top-name').innerText = data.full_name;
                    loadSavedBanks();
                }
            }
        }

        async function saveNameToDB() {
            const fName = document.getElementById('reg-fname').value.trim();
            const lName = document.getElementById('reg-lname').value.trim();
            if (fName.length < 2 || lName.length < 2) return showToast("Enter valid names", false);

            const fullName = fName + " " + lName;
            toggleBtnLoading('reg-name-btn', true);

            try {
                const { error } = await _supa.from('profiles').update({ full_name: fullName }).eq('email', userEmail);
                if (!error) {
                    document.getElementById('name-reg-overlay').style.display = 'none';
                    savedFullName = fullName.toLowerCase();
                    document.getElementById('top-name').innerText = fullName;
                    showToast("Identity Saved", true);
                    loadSavedBanks();
                } else { showToast("Database error", false); }
            } catch (err) { showToast("Connection failed", false); }
            toggleBtnLoading('reg-name-btn', false);
        }

        async function loadSavedBanks() {
            const { data } = await _supa.from('saved_banks').select('*').eq('email', userEmail);
            if (data && data.length > 0) {
                document.getElementById('saved-banks-section').style.display = 'block';
                document.getElementById('new-bank-form').style.display = 'none';
                document.getElementById('saved-banks-list').innerHTML = data.map(bank => `
                    <div class="saved-bank-item bouncy" id="bank-${bank.id}" onclick='selectSavedBank(${JSON.stringify(bank)})'>
                        <div style="font-size:14px; font-weight:700;">${bank.bank_name}<br><span style="font-size:11px; color:#8e8e93;">${bank.acc_num}</span></div>
                        <div class="delete-bank-btn" onclick="deleteBank(event, ${bank.id})"><i class="fa-solid fa-trash-can"></i></div>
                    </div>
                `).join('');
            }
        }

        async function deleteBank(e, id) {
            e.stopPropagation();
            const { error } = await _supa.from('saved_banks').delete().eq('id', id);
            if (!error) {
                showToast("Account Deleted", true);
                loadSavedBanks();
            }
        }

        function selectSavedBank(bank) {
            selectedSavedBank = bank;
            isVerified = true;
            document.querySelectorAll('.saved-bank-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`bank-${bank.id}`).classList.add('active');
        }

        function showNewBankForm() {
            selectedSavedBank = null;
            document.getElementById('saved-banks-section').style.display = 'none';
            document.getElementById('new-bank-form').style.display = 'block';
            isVerified = false;
        }

        function handleTimeRestrictions() {
            const now = new Date();
            const hour = now.getHours();
            const isLocked = (hour >= 21 || hour < 8);
            if (isLocked) {
                document.getElementById('lock-overlay').style.display = 'flex';
                updateCountdown('lock-countdown', 8);
            } else {
                document.getElementById('lock-overlay').style.display = 'none';
                updateCountdown('active-countdown', 21);
            }
        }

        function updateCountdown(elementId, targetHour) {
            const now = new Date();
            let target = new Date();
            target.setHours(targetHour, 0, 0, 0);
            if (now > target && targetHour === 8) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById(elementId).innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function updateFeeCalc() {
            const val = parseFloat(document.getElementById('amount').value) || 0;
            const fee = val * 0.03;
            const net = val - fee;
            document.getElementById('fee-display').innerHTML = `<span>Fee (3%): ₦${fee.toFixed(2)}</span><span style="color:white;">Net: ₦${net > 0 ? net.toFixed(2) : '0.00'}</span>`;
        }

        function handleAccInput(el) {
            if(el.value.length > 10) el.value = el.value.slice(0, 10);
            if(el.value.length === 10) checkAccount();
            else isVerified = false;
        }

        async function checkAccount() {
            const bank = document.getElementById('bank-name').value;
            const acc = document.getElementById('acc-num').value;
            const statusBox = document.getElementById('verify-status');
            if (!bank || acc.length !== 10) return;
            statusBox.style.display = 'block';
            statusBox.className = 'verify-tag v-loading';
            statusBox.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> SCANNING...';
            try {
                const { data } = await _supa.functions.invoke('verify-bank', { body: { account_number: acc, account_bank: bank } });
                if (data && data.status === 'success') {
                    const verifiedName = data.data.account_name.toLowerCase();
                    if (savedFullName.split(' ').every(p => verifiedName.includes(p))) {
                        statusBox.className = 'verify-tag v-success';
                        statusBox.innerHTML = 'VERIFIED: ' + data.data.account_name;
                        isVerified = true;
                        window.latestVerifiedAccount = data.data;
                    } else { statusBox.className = 'verify-tag v-error'; statusBox.innerHTML = 'NAME MISMATCH'; }
                } else { statusBox.className = 'verify-tag v-error'; statusBox.innerHTML = 'INVALID ACCOUNT'; }
            } catch (e) { statusBox.innerHTML = 'OFFLINE'; }
        }

        function validateWithdrawal() {
            if (!isVerified) return showToast("Verify details", false);
            const amt = parseFloat(document.getElementById('amount').value);
            if (!amt || amt < 600) return showToast("Min ₦600", false);
            if (amt > userBalance) return showToast("Insufficient Funds", false);
            document.getElementById('pin-overlay').style.display = 'flex';
        }

        async function confirmPINAction() {
            const pinVal = document.getElementById('pin-field').value;
            if(pinVal.length !== 4) return showToast("Enter 4-digit PIN", false);
            toggleBtnLoading('confirm-pin-btn', true);
            if(!savedPIN) { await _supa.from('profiles').update({ withdrawal_pin: pinVal }).eq('email', userEmail); savedPIN = pinVal; }
            if(pinVal === savedPIN) submitWithdrawal();
            else { showToast("Wrong PIN", false); toggleBtnLoading('confirm-pin-btn', false); }
        }

        async function submitWithdrawal() {
            let bankName, acc, bankCode, accountName;
            if (selectedSavedBank) {
                bankName = selectedSavedBank.bank_name; acc = selectedSavedBank.acc_num;
                bankCode = selectedSavedBank.bank_code; accountName = selectedSavedBank.account_name;
            } else {
                bankCode = document.getElementById('bank-name').value;
                bankName = document.getElementById('selected-bank-display').innerText;
                acc = document.getElementById('acc-num').value;
                accountName = window.latestVerifiedAccount ? window.latestVerifiedAccount.account_name : '';
            }
            const amt = parseFloat(document.getElementById('amount').value);
            try {
                const { error } = await _supa.from('withdrawals').insert([{ email: userEmail, amount: amt * 0.97, original_amount: amt, bank_name: bankName, acc_num: acc, status: 'PENDING' }]);
                if (!error) {
                    await _supa.from('profiles').update({ balance: userBalance - amt }).eq('email', userEmail);
                    if (!selectedSavedBank) {
                        await _supa.from('saved_banks').upsert([{ email: userEmail, bank_name: bankName, bank_code: bankCode, acc_num: acc, account_name: accountName }], { onConflict: 'email,acc_num' });
                    }
                    showToast("Withdrawal Pending", true);
                    setTimeout(() => location.href='index.html', 1500);
                }
            } catch (err) { showToast("Error", false); toggleBtnLoading('confirm-pin-btn', false); }
        }

        function toggleBtnLoading(id, load) {
            const btn = document.getElementById(id);
            if(!btn) return;
            const text = btn.querySelector('.btn-text');
            const loader = btn.querySelector('.dot-loader');
            if(text) text.style.display = load ? 'none' : 'block';
            if(loader) loader.style.display = load ? 'flex' : 'none';
            btn.disabled = load;
        }

        function showToast(m, s) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.style.background = s ? "rgba(52, 199, 89, 0.9)" : "rgba(255, 59, 48, 0.9)";
            t.style.display = "block";
            setTimeout(() => t.style.display="none", 2500);
        }
    </script>
</body>
</html>
