<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Register - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #007aff; 
            --bg-dark: #000000; 
            --card-bg: rgba(28, 28, 30, 0.9); 
            --input-border: rgba(255, 255, 255, 0.1);
            --success: #32d74b;
            --error: #ff453a;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }
        input { user-select: auto !important; -webkit-user-select: auto !important; }

        body { 
            background: var(--bg-dark);
            color: white; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .bg-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,122,255,0.15) 0%, transparent 70%);
            z-index: -1; top: -10%; right: -10%;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 25px; border-radius: 35px; 
            width: 90%; max-width: 370px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
            animation: iosReveal 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes iosReveal {
            from { opacity: 0; transform: scale(1.05) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 { font-size: 28px; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }

        .input-list {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px; overflow: hidden; margin-bottom: 25px;
            border: 0.5px solid var(--input-border);
        }

        .input-group { 
            position: relative; border-bottom: 0.5px solid var(--input-border);
            display: flex; align-items: center; padding: 0 15px;
        }
        .input-group:last-child { border-bottom: none; }
        .input-group i { color: var(--primary); font-size: 1rem; width: 25px; }

        input { 
            flex: 1; padding: 18px 10px; background: transparent; border: none;
            color: white; font-size: 17px; outline: none;
        }

        .main-btn { 
            width: 100%; height: 54px; background: var(--primary); 
            color: white; border: none; border-radius: 14px; 
            font-size: 17px; font-weight: 600; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .main-btn:active { transform: scale(0.96); opacity: 0.8; }

        /* --- THREE DOT LOADER --- */
        .loader { display: none; gap: 5px; align-items: center; }
        .dot { 
            width: 7px; height: 7px; background: white; border-radius: 50%; 
            animation: bounce 0.6s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { from { opacity: 0.3; transform: translateY(0); } to { opacity: 1; transform: translateY(-6px); } }

        /* --- iOS NOTIFICATION STYLE --- */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            padding: 14px 24px; border-radius: 50px; z-index: 10000; 
            font-weight: 600; font-size: 15px; color: white;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap;
        }
        #toast.show { top: 60px; }

        .footer-link { margin-top: 25px; font-size: 15px; color: #8e8e93; cursor: pointer; }
        .footer-link span { color: var(--primary); font-weight: 500; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-glow"></div>
    <div id="toast"></div>

    <div class="card">
        <h2>Sign Up</h2>
        
        <div class="input-list">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="pass" placeholder="Password">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-shield-check"></i>
                <input type="password" id="confirm_pass" placeholder="Confirm Password">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="number" id="nin" placeholder="NIN (11 Digits)">
            </div>
        </div>

        <button id="signup-btn" class="main-btn" onclick="doSignUp()">
            <span id="btn-text">Create Account</span>
            <div id="btn-loader" class="loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </button>
        
        <p class="footer-link" onclick="location.href='login.html'">
            Already have an account? <span>Login</span>
        </p>
    </div>

    <script>
        (function(){ emailjs.init("GeCipLr0kFPCN8feN"); })();

        function showToast(msg, isSuccess) {
            const t = document.getElementById('toast');
            t.innerHTML = isSuccess ? `<i class="fa-solid fa-circle-check"></i> ${msg}` : `<i class="fa-solid fa-circle-exclamation"></i> ${msg}`;
            t.style.background = isSuccess ? "rgba(52, 215, 75, 0.95)" : "rgba(255, 69, 58, 0.95)";
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        // Global reset function to ensure it works in any block
        function resetBtn() {
            const btn = document.getElementById('signup-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            btn.disabled = false;
            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
        }

        async function doSignUp() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const confirmPass = document.getElementById('confirm_pass').value;
            const nin = document.getElementById('nin').value;
            const btn = document.getElementById('signup-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            // Check if getClient exists (from config.js)
            if (typeof getClient !== 'function') {
                showToast("Configuration Error", false);
                return;
            }
            
            const _supa = getClient();

            if (!email || !pass || !nin) return showToast("Please fill all fields", false);
            if (pass !== confirmPass) return showToast("Passwords do not match", false);
            if (nin.length !== 11) return showToast("NIN must be 11 digits", false);

            // UI Loading State
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'flex';

            try {
                const { data: existingUser, error: fetchError } = await _supa
                    .from('profiles')
                    .select('email, otp_status')
                    .eq('email', email)
                    .maybeSingle();

                if (existingUser && existingUser.otp_status === 'VERIFIED') {
                    showToast("Email already exists!", false);
                    resetBtn();
                    return;
                }

                const generatedOTP = Math.floor(100000 + Math.random() * 900000);

                await emailjs.send('service_huev2pt', 'template_r50pcwk', {
                    email: email, 
                    passcode: generatedOTP 
                });

                const { error: dbError } = await _supa.from('profiles').upsert([
                    { 
                        email: email, 
                        password: pass, 
                        nin: nin, 
                        profile_code: Math.random().toString(36).substring(2, 12).toUpperCase(),
                        balance: 0,
                        otp_status: 'PENDING'
                    }
                ], { onConflict: 'email' });

                if (dbError) throw dbError;

                localStorage.setItem('pending_otp', generatedOTP);
                localStorage.setItem('user_email', email);

                showToast("OTP Sent Successfully!", true);
                setTimeout(() => { location.href='otp.html'; }, 2000);

            } catch (err) {
                console.error(err);
                showToast("Connection failed. Try again.", false);
                resetBtn();
            }
        }
    </script>
</body>
</html>
