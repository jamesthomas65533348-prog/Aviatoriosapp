<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fuel Tank - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-dark: #000000;
            --ios-card: rgba(28, 28, 30, 0.8);
            --success: #34c759; 
            --error: #ff3b30; 
            --purple: #af52de; 
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }
        input { user-select: auto !important; -webkit-user-select: auto !important; }

        body { 
            background: var(--ios-dark);
            color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1c1c1e 0%, #000 70%);
        }

        /* --- HEADER --- */
        .deposit-header {
            padding: 40px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn { 
            width: 40px; height: 40px; border-radius: 50%; 
            background: rgba(255,255,255,0.05); display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- MAIN UI --- */
        .main-container {
            padding: 20px;
            max-width: 450px; margin: 0 auto;
        }

        .hero-icon {
            width: 70px; height: 70px; background: rgba(175, 82, 222, 0.1);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            margin: 20px auto 10px; color: var(--purple); font-size: 2rem;
        }

        .amount-wrapper { position: relative; margin-top: 25px; }
        .amount-wrapper span { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 1.8rem; font-weight: 800; color: var(--ios-blue); }
        
        input[type="number"] { 
            width: 100%; padding: 25px 25px 25px 60px; border-radius: 24px; 
            background: var(--ios-card); border: 1px solid rgba(255,255,255,0.1); 
            color: white; font-size: 2.2rem; font-weight: 800; outline: none;
        }

        /* --- CHIPS --- */
        .chips-container {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 20px 0; scrollbar-width: none;
        }
        .chips-container::-webkit-scrollbar { display: none; }
        .chip {
            background: var(--ios-card); padding: 12px 20px;
            border-radius: 14px; font-size: 14px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.05); white-space: nowrap;
        }
        .chip:active { background: var(--ios-blue); }

        /* --- BOUNCY LOADING BUTTON --- */
        .instant-btn { 
            width: 100%; padding: 20px; border-radius: 24px; border: none; 
            color: white; font-size: 17px; font-weight: 700; 
            background: var(--ios-blue);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .instant-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* DOT ANIMATION */
        .dot-container { display: none; gap: 4px; align-items: center; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: dotBounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* --- TOAST --- */
        #notification-box {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; padding: 15px; border-radius: 18px;
            z-index: 9999; display: flex; align-items: center; gap: 12px;
            background: rgba(28, 28, 30, 0.98); border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s;
        }
        #notification-box.show { top: 50px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="notification-box">
        <div id="nt-icon-box"></div>
        <div id="nt-text" style="font-weight: 600; font-size: 14px;"></div>
    </div>

    <div class="deposit-header">
        <div class="back-btn" onclick="location.href='index.html'"><i class="fa-solid fa-chevron-left"></i></div>
        <div style="font-weight: 800; font-size: 15px;">Deposit</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="main-container">
        <div class="hero-icon"><i class="fa-solid fa-bolt"></i></div>
        <h2 style="text-align:center; margin: 0; font-weight: 800; font-size: 24px;">Add Funds</h2>
        <p style="text-align:center; color: #8e8e93; font-size: 14px; margin-top: 5px;">Refill your pilot wallet</p>

        <div class="amount-wrapper">
            <span>₦</span>
            <input type="number" id="amount" placeholder="500">
        </div>

        <div class="chips-container">
            <div class="chip" onclick="setAmt(500)">₦500</div>
            <div class="chip" onclick="setAmt(1000)">₦1k</div>
            <div class="chip" onclick="setAmt(5000)">₦5k</div>
            <div class="chip" onclick="setAmt(10000)">₦10k</div>
        </div>

        <button id="instant-pay-btn" class="instant-btn" onclick="triggerPayment()">
            <span id="btn-text">Proceed to Payment</span>
            <div id="btn-loader" class="dot-container">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </button>

        <div style="text-align:center; margin-top:25px; font-size:11px; color:#48484a; font-weight:600;">
            <i class="fa-solid fa-shield-halved"></i> SECURED BY FLUTTERWAVE
        </div>
    </div>

    <script>
        var _supa;
        var userEmail = localStorage.getItem('user_email');

        window.onload = function() { _supa = getClient(); };

        function setAmt(val) { document.getElementById('amount').value = val; }

        function triggerPayment() {
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const amt = document.getElementById('amount').value;

            if(!amt || amt < 100) return notify("Minimum deposit is ₦100", "error");

            // Show Bouncy Dots
            btnText.style.display = 'none';
            btnLoader.style.display = 'flex';

            setTimeout(() => {
                payWithFlutterwave();
                // Reset button after window opens
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
            }, 1200);
        }

        function payWithFlutterwave() {
            const amt = document.getElementById('amount').value;

            FlutterwaveCheckout({
                public_key: "FLWPUBK-4b9baac52d43aa02765923e58050f152-X",
                tx_ref: "AV-" + Date.now(),
                amount: amt,
                currency: "NGN",
                customer: { email: userEmail },
                callback: function (data) {
                    notify("Success! Redirecting...", "success");
                    setTimeout(() => { location.href = 'index.html'; }, 2500);
                },
                onclose: function() { 
                    notify("Payment Cancelled", "error"); 
                }
            });
        }

        function notify(msg, type) {
            const box = document.getElementById('notification-box');
            box.className = 'show';
            document.getElementById('nt-icon-box').innerHTML = type === 'success' ? 
                '<i class="fa-solid fa-circle-check" style="color:#34c759"></i>' : 
                '<i class="fa-solid fa-circle-xmark" style="color:#ff3b30"></i>';
            document.getElementById('nt-text').innerText = msg;
            setTimeout(() => box.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
