<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Support - Aviator Genius</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --ios-blue: #007aff; 
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-secondary: #2c2c2e;
            --ios-grey: #8e8e93;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --msg-user: #007aff;
            --msg-agent: #262629;
            --bounce-transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            background: var(--ios-bg); color: white;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* --- BOUNCY UTILITY --- */
        .bouncy { 
            transition: var(--bounce-transition), opacity 0.2s ease; 
            cursor: pointer;
        }
        .bouncy:active { transform: scale(0.92); opacity: 0.7; }

        /* --- HEADER --- */
        .header { 
            padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .back-btn { color: var(--ios-blue); font-size: 17px; font-weight: 400; display: flex; align-items: center; gap: 5px; }
        
        .agent-label { text-align: center; flex-grow: 1; margin-right: 40px; position: relative; }
        .agent-name { font-size: 13px; font-weight: 600; display: block; }
        .agent-status { font-size: 10px; color: var(--ios-grey); display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .online-dot { 
            width: 6px; height: 6px; background: var(--ios-green); border-radius: 50%; 
            display: inline-block; box-shadow: 0 0 5px var(--ios-green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- CHAT AREA --- */
        #chat-window { 
            flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 8px;
            padding-bottom: 120px;
        }

        .msg { 
            max-width: 75%; padding: 10px 16px; border-radius: 20px; 
            font-size: 16px; line-height: 1.35; position: relative; 
            animation: iosPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: bottom;
        }

        @keyframes iosPop { from { opacity: 0; transform: scale(0.5) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .msg-user { align-self: flex-end; background: var(--msg-user); color: white; }
        .msg-agent { align-self: flex-start; background: var(--msg-agent); color: white; }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; }

        /* --- INPUT AREA --- */
        .input-container {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom));
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: flex; align-items: flex-end; gap: 12px;
            transition: 0.3s ease;
        }

        .input-bar {
            flex-grow: 1; background: #000; border: 0.5px solid #333;
            border-radius: 25px; padding: 8px 15px; display: flex; align-items: center;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-error { border-color: var(--ios-red) !important; box-shadow: 0 0 10px rgba(255, 59, 48, 0.2); animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #msg-input {
            flex-grow: 1; background: none; border: none; color: white;
            padding: 8px 0; font-size: 16px; outline: none;
        }

        .cam-btn { color: var(--ios-grey); font-size: 22px; padding: 5px; }
        .send-btn { 
            background: var(--ios-blue); color: white; width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        /* --- PREVIEW --- */
        #pending-image-container { 
            display: none; position: absolute; bottom: 85px; left: 15px; right: 15px;
            background: var(--ios-card); padding: 10px; border-radius: 15px;
            align-items: center; gap: 10px; border: 1px solid var(--ios-blue);
            animation: iosPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #image-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; }

        /* --- MODAL (BOUNCY VERSION) --- */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.active { display: flex; opacity: 1; }
        
        .modal-content { 
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 14px; text-align: center; width: 270px;
            transform: scale(1.2); transition: var(--bounce-transition);
        }
        .modal.active .modal-content { transform: scale(1); }

        .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 5px; color: white; }
        .modal-desc { font-size: 13px; color: white; opacity: 0.8; margin-bottom: 20px; line-height: 1.4; }
        .modal-btns { display: flex; border-top: 0.5px solid rgba(255,255,255,0.2); margin: 0 -20px -20px -20px; }
        .modal-btns button { 
            flex: 1; padding: 12px; background: none; border: none; color: var(--ios-blue);
            font-size: 17px; cursor: pointer;
        }
        .btn-destructive { font-weight: 600; color: var(--ios-red) !important; border-left: 0.5px solid rgba(255,255,255,0.2) !important; }

    </style>
</head>
<body>

<div class="header">
    <div class="back-btn bouncy" onclick="location.href='support.html'">
        <i class="fa-solid fa-chevron-left"></i> Support
    </div>
    <div class="agent-label">
        <span class="agent-name">Gaming Agent</span>
        <span class="agent-status"><span class="online-dot"></span> Online</span>
    </div>
    <div class="bouncy" onclick="confirmEnd()" style="color: var(--ios-red); font-size: 14px; font-weight: 600;">End</div>
</div>

<div id="chat-window"></div>

<div id="pending-image-container">
    <img id="image-preview" src="">
    <div style="flex-grow: 1; font-size: 12px; color: var(--ios-grey);">Image ready to send</div>
    <i class="fa-solid fa-circle-xmark bouncy" onclick="clearImage()" style="color: var(--ios-red);"></i>
</div>

<div class="input-container" id="input-area">
    <label class="cam-btn bouncy">
        <i class="fa-solid fa-camera"></i>
        <input type="file" id="img-upload" hidden accept="image/*" onchange="previewImage(this)">
    </label>
    <div class="input-bar" id="input-bar">
        <input type="text" id="msg-input" placeholder="iMessage" autocomplete="off">
    </div>
    <div class="send-btn bouncy" onclick="sendMessage()">
        <i class="fa-solid fa-arrow-up"></i>
    </div>
</div>

<div id="end-modal" class="modal">
    <div class="modal-content">
        <div class="modal-title">End Session?</div>
        <div class="modal-desc">This will clear your chat history with the agent.</div>
        <div class="modal-btns">
            <button class="bouncy" onclick="closeModal()">Cancel</button>
            <button class="bouncy btn-destructive" onclick="endSession()">End Now</button>
        </div>
    </div>
</div>

<script>
    const _supa = getClient();
    const myEmail = localStorage.getItem('user_email');
    const chatWin = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const inputBar = document.getElementById('input-bar');
    let pendingFile = null;
    let isAutoReplyTriggered = false;

    window.onload = () => {
        if(!myEmail) { location.href = 'index.html'; return; }
        loadChatHistory();
    };

    async function loadChatHistory() {
        const { data } = await _supa.from('chats')
            .select('*')
            .or(`sender_email.eq.${myEmail},recipient_role.eq.${myEmail}`)
            .order('created_at', { ascending: true });

        if (data && data.length > 0) {
            isAutoReplyTriggered = true;
            data.forEach(msg => appendMessage(msg));
        }
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            pendingFile = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('pending-image-container').style.display = 'flex';
            };
            reader.readAsDataURL(pendingFile);
        }
    }

    function clearImage() {
        pendingFile = null;
        document.getElementById('img-upload').value = '';
        document.getElementById('pending-image-container').style.display = 'none';
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        
        // Error handling if empty
        if (!text && !pendingFile) {
            inputBar.classList.add('input-error');
            setTimeout(() => inputBar.classList.remove('input-error'), 400);
            return;
        }

        const currentText = text;
        const currentFile = pendingFile;
        
        msgInput.value = '';
        clearImage();

        let uploadedUrl = null;
        if (currentFile) {
            const path = `uploads/${Date.now()}_${currentFile.name}`;
            const { data: uploadData } = await _supa.storage.from('chats').upload(path, currentFile);
            if (uploadData) {
                const { data: urlData } = _supa.storage.from('chats').getPublicUrl(path);
                uploadedUrl = urlData.publicUrl;
            }
        }

        await _supa.from('chats').insert([{ 
            sender_email: myEmail, 
            message: currentText, 
            image_url: uploadedUrl,
            recipient_role: 'admin',
            is_read: false
        }]);

        if (!isAutoReplyTriggered) {
            isAutoReplyTriggered = true;
            setTimeout(async () => {
                await _supa.from('chats').insert([{ 
                    sender_email: 'System',
                    message: "Thanks for reaching out! You've been added to our queue. An agent will be with you in 3-5 hours.", 
                    recipient_role: myEmail,
                    is_read: false
                }]);
            }, 1000);
        }
    }

    function appendMessage(data) {
        if (data.id && document.getElementById(`msg-${data.id}`)) return;

        const isMe = data.sender_email === myEmail;
        const div = document.createElement('div');
        if(data.id) div.id = `msg-${data.id}`;
        div.className = `msg ${isMe ? 'msg-user' : 'msg-agent'}`;
        
        let content = '';
        if(data.image_url) content += `<img src="${data.image_url}" onclick="window.open('${data.image_url}')">`;
        if(data.message) content += `<div>${data.message}</div>`;
        
        div.innerHTML = content;
        chatWin.appendChild(div);
        
        // Smooth scroll
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Modal Bouncy Logic
    function confirmEnd() { 
        document.getElementById('end-modal').classList.add('active'); 
    }
    
    function closeModal() { 
        const modal = document.getElementById('end-modal');
        modal.style.opacity = "0";
        modal.querySelector('.modal-content').style.transform = "scale(0.8)";
        setTimeout(() => {
            modal.classList.remove('active');
            modal.style.opacity = "";
            modal.querySelector('.modal-content').style.transform = "";
        }, 300);
    }

    async function endSession() {
        await _supa.from('chats').delete().or(`sender_email.eq.${myEmail},recipient_role.eq.${myEmail}`);
        location.reload(); 
    }

    msgInput.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
