<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shield Command - Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.6); 
            --success: #10b981; 
            --error: #ef4444; 
            --warning: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.03);
            --accent: #00f2ff;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; box-sizing: border-box; }

        body { 
            background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Inter', system-ui, sans-serif; 
            padding: 0; margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .bouncy { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .bouncy:active { transform: scale(0.9); }

        .admin-header {
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(25px);
            padding: 20px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; flex-direction: column; gap: 15px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .shield-logo { font-weight: 900; letter-spacing: 3px; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; color: var(--accent); text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        
        /* MAINTENANCE TOGGLE CSS */
        .m-container { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .m-label { font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--error); }
        input:checked + .slider:before { transform: translateX(20px); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 4px; }
        .stat-label { font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 900; color: #fff; }

        .section-title { font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: var(--accent); margin: 30px 20px 10px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .withdraw-list { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 15px; }
        .withdraw-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; padding: 20px; position: relative;
            transition: 0.4s;
            animation: slideUp 0.4s ease;
        }
        .withdraw-card.fade-out { transform: scale(0.8); opacity: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .user-info { display: flex; flex-direction: column; }
        .user-email { font-size: 0.85rem; font-weight: 800; color: #fff; }
        .req-date { font-size: 0.65rem; color: #64748b; }
        .amount-tag { font-size: 1.2rem; font-weight: 900; color: var(--accent); }

        .bank-details { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .bank-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; margin-bottom: 8px; }
        .bank-label { color: #94a3b8; }
        .bank-val { color: #fff; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        
        .copy-trigger { 
            background: rgba(255,255,255,0.1); 
            width: 28px; height: 28px; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--accent); border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
        }

        .action-row { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 900; font-size: 0.75rem; letter-spacing: 1px; color: white; cursor: pointer; }
        .btn-approve { background: var(--success); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2); }
        .btn-reject { background: var(--error); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.2); }

        #confirm-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 20000; padding: 30px;
            backdrop-filter: blur(10px);
        }
        .confirm-box { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; }
        
        #broadcast-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 11000; padding: 20px; backdrop-filter: blur(15px); }
        .broadcast-box { background: #0f172a; border: 1px solid rgba(59, 130, 246, 0.3); padding: 30px; border-radius: 32px; width: 100%; max-width: 450px; }
        .broadcast-textarea { width: 100%; height: 110px; background: rgba(0,0,0,0.4); color: white; border: 1px solid #1e293b; border-radius: 18px; padding: 18px; margin-top: 20px; font-size: 0.95rem; outline: none; resize: none; }
        
        #broadcast-image-preview { width: 100%; max-height: 100px; object-fit: contain; border-radius: 12px; margin-top: 10px; display: none; border: 1px solid rgba(0, 242, 255, 0.2); }
        .file-input-wrapper { margin-top: 15px; position: relative; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 14px; border: 1px dashed rgba(255,255,255,0.1); }
        .file-input-wrapper input { font-size: 0.7rem; color: #94a3b8; width: 100%; }

        .btn-row { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; border: none; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 0.8rem; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #1e40af); }
        .fab-notif { position: fixed; bottom: 100px; right: 30px; width: 60px; height: 60px; background: var(--primary); color: white; border: none; border-radius: 20px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #toast-wrap { position: fixed; top: 30px; left: 20px; right: 20px; z-index: 12000; pointer-events: none; }
        .toast { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); padding: 16px 20px; border-radius: 20px; margin-bottom: 12px; transform: translateY(-120%); transition: 0.5s; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); font-size: 0.85rem; font-weight: 600; }
        .toast.show { transform: translateY(0); }

        /* --- CHAT TAB STYLES --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; padding: 15px 0; z-index: 5000; }
        .nav-item { color: #64748b; font-size: 1.2rem; cursor: pointer; position: relative; }
        .nav-item.active { color: var(--accent); }
        .unread-dot { position: absolute; top: -5px; right: -5px; width: 10px; height: 10px; background: var(--error); border-radius: 50%; display: none; border: 2px solid #0f172a; }

        .chat-list-item { background: var(--card); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .chat-user-email { font-size: 0.85rem; font-weight: 700; }

        /* Admin Chat Modal */
        #admin-chat-modal { position: fixed; inset: 0; background: var(--bg); z-index: 15000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; background: #0f172a; }
        #admin-chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; color: white; outline: none; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 0.85rem; }
        .msg-user { align-self: flex-start; background: rgba(255,255,255,0.1); }
        .msg-me { align-self: flex-end; background: var(--primary); }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="toast-wrap"></div>

    <div id="confirm-modal">
        <div class="confirm-box">
            <i id="confirm-icon" class="fa-solid fa-circle-question" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <h3 id="confirm-title" style="margin:0;">Confirm Action?</h3>
            <p id="confirm-msg" style="font-size: 0.8rem; color: #94a3b8; margin: 15px 0; line-height: 1.6;"></p>
            <div class="btn-row">
                <button id="final-confirm-btn" class="btn btn-primary bouncy">Confirm</button>
                <button onclick="closeConfirm()" class="btn bouncy" style="background:rgba(255,255,255,0.05); color:#94a3b8;">Cancel</button>
            </div>
        </div>
    </div>

    <div id="broadcast-modal">
        <div class="broadcast-box">
            <div style="display:flex; align-items:center; gap:12px;"><i class="fa-solid fa-tower-broadcast" style="color:var(--primary); font-size:1.5rem;"></i><h3 style="margin:0;">SIGNAL DEPLOYMENT</h3></div>
            <textarea id="broadcast-msg" class="broadcast-textarea" placeholder="Message pilots..."></textarea>
            
            <div class="file-input-wrapper">
                <div style="font-size: 0.6rem; color: var(--accent); margin-bottom: 5px; font-weight: 800;">ATTACH IMAGE (OPTIONAL)</div>
                <input type="file" id="broadcast-image" accept="image/*" onchange="previewBroadcastImg(this)">
                <img id="broadcast-image-preview">
            </div>

            <div class="btn-row">
                <button onclick="sendBroadcast()" id="send-btn" class="btn btn-primary bouncy">Transmit</button>
                <button onclick="closeBroadcastModal()" class="btn bouncy" style="background:rgba(255,255,255,0.05); color:#94a3b8;">Abort</button>
            </div>
        </div>
    </div>

    <div id="admin-chat-modal">
        <div class="chat-header">
            <i class="fa-solid fa-arrow-left bouncy" onclick="closeAdminChat()"></i>
            <div id="active-chat-email" style="font-weight: 800; font-size: 0.9rem;">user@email.com</div>
        </div>
        <div id="admin-chat-window"></div>
        <div class="chat-input-area">
            <label class="bouncy" style="color: var(--accent);"><i class="fa-solid fa-image"></i><input type="file" hidden accept="image/*" onchange="adminSendImage(this)"></label>
            <input type="text" id="admin-reply-input" class="chat-input" placeholder="Type reply...">
            <i class="fa-solid fa-paper-plane bouncy" style="color:var(--primary);" onclick="adminReply()"></i>
        </div>
    </div>

    <div id="tab-withdraw" class="tab-content active">
        <div class="admin-header">
            <div class="header-top">
                <div class="shield-logo"><i class="fa-solid fa-satellite-dish"></i> COMMAND SHIELD</div>
                
                <div class="m-container">
                    <span class="m-label" id="m-status-text">LIVE</span>
                    <label class="switch">
                        <input type="checkbox" id="m-toggle" onchange="toggleMaintenance(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card bouncy"><span class="stat-label">Pending Payouts</span><span class="stat-value" id="pending-count">0</span></div>
                <div class="stat-card bouncy"><span class="stat-label">Total Pilots</span><span class="stat-value" id="approved-count">0</span></div>
            </div>
        </div>

        <div class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> Withdrawal Requests</div>
        <div class="withdraw-list" id="withdraw-container">
            <div style="text-align:center; padding:50px; opacity:0.3; font-size:0.8rem;">Scanning for requests...</div>
        </div>
    </div>

    <div id="tab-chat" class="tab-content">
        <div class="admin-header">
            <div class="shield-logo">PILOT COMMUNICATIONS</div>
        </div>
        <div class="section-title"><i class="fa-solid fa-comments"></i> User Conversations</div>
        <div class="withdraw-list" id="chat-list-container">
            <div style="text-align:center; padding:50px; opacity:0.3; font-size:0.8rem;">No active chats...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active bouncy" onclick="switchTab('withdraw', this)">
            <i class="fa-solid fa-receipt"></i>
        </div>
        <div class="nav-item bouncy" id="chat-nav-item" onclick="switchTab('chat', this)">
            <i class="fa-solid fa-message"></i>
            <div class="unread-dot" id="global-unread"></div>
        </div>
    </div>

    <button class="fab-notif bouncy" onclick="openBroadcastModal()"><i class="fa-solid fa-bolt"></i></button>

    <script>
        var _supa;
        let activeRequest = null;
        let activeChatUser = null;
        let chatSubscription = null;
        
        // MAINTENANCE CONFIG
        const CONFIG_ID = "f4c6da92-d822-4e30-8a93-b90c7df78390";

        window.onload = function() {
            if (!isAdmin()) { location.href = 'home.html'; return; }
            _supa = getClient();
            fetchRequests();
            updateStats();
            fetchChatList();
            listenForNewMessages();
            fetchMaintenance(); // Fetch maintenance status on load
            setInterval(() => { fetchRequests(); updateStats(); fetchChatList(); }, 15000);
        };

        // MAINTENANCE FUNCTIONS
        async function fetchMaintenance() {
            const { data } = await _supa.from('system_config').select('maintenance_mode').eq('id', CONFIG_ID).maybeSingle();
            if (data) {
                document.getElementById('m-toggle').checked = data.maintenance_mode;
                document.getElementById('m-status-text').innerText = data.maintenance_mode ? "MAINT" : "LIVE";
                document.getElementById('m-status-text').style.color = data.maintenance_mode ? "var(--error)" : "var(--success)";
            }
        }

        async function toggleMaintenance(isActive) {
            const { error } = await _supa.from('system_config').update({ maintenance_mode: isActive, updated_at: new Date() }).eq('id', CONFIG_ID);
            if (!error) {
                document.getElementById('m-status-text').innerText = isActive ? "MAINT" : "LIVE";
                document.getElementById('m-status-text').style.color = isActive ? "var(--error)" : "var(--success)";
                showToast(isActive ? "SHUTDOWN" : "ONLINE", isActive ? "System Restricted" : "System Live");
            } else {
                showToast("ERROR", "Update Failed", true);
                document.getElementById('m-toggle').checked = !isActive;
            }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
        }

        // --- CHAT LOGIC ---
        async function fetchChatList() {
            const { data } = await _supa.from('chats').select('*').order('created_at', { ascending: false });
            if(!data) return;

            const users = [...new Set(data.filter(c => c.sender_email !== 'System').map(c => c.sender_email === 'admin' ? c.recipient_role : c.sender_email))];
            const container = document.getElementById('chat-list-container');
            
            // Check global unread status: messages for admin where is_read is false
            const hasUnread = data.some(m => m.recipient_role === 'admin' && m.is_read === false);
            document.getElementById('global-unread').style.display = hasUnread ? 'block' : 'none';

            if(users.length > 0) {
                container.innerHTML = users.filter(u => u && u !== 'admin' && u !== 'user').map(u => `
                    <div class="chat-list-item bouncy" onclick="openAdminChat('${u}')">
                        <div class="chat-user-email">${u}</div>
                        <i class="fa-solid fa-chevron-right" style="opacity:0.3"></i>
                    </div>
                `).join('');
            }
        }

        async function openAdminChat(email) {
            activeChatUser = email;
            document.getElementById('active-chat-email').innerText = email;
            document.getElementById('admin-chat-modal').style.display = 'flex';
            
            markAsRead(email);
            loadFullConversation(email);

            if(chatSubscription) chatSubscription.unsubscribe();
            chatSubscription = _supa.channel('admin_room')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, payload => {
                const msg = payload.new;
                if(msg.sender_email === activeChatUser || (msg.sender_email === 'admin' && msg.recipient_role === activeChatUser)) {
                    appendAdminMessage(msg);
                    if(msg.recipient_role === 'admin') markAsRead(activeChatUser);
                }
            }).subscribe();
        }

        // --- CORE FIX: UPDATE IS_READ BOOLEAN ---
        async function markAsRead(email) {
            const { error } = await _supa.from('chats')
                .update({ is_read: true })
                .eq('sender_email', email)
                .eq('recipient_role', 'admin')
                .eq('is_read', false);
            
            if(!error) fetchChatList(); 
        }

        async function loadFullConversation(email) {
            const { data } = await _supa.from('chats')
                .select('*')
                .or(`sender_email.eq.${email},recipient_role.eq.${email}`)
                .order('created_at', { ascending: true });
            
            const win = document.getElementById('admin-chat-window');
            win.innerHTML = '';
            if(data) data.forEach(m => appendAdminMessage(m));
        }

        function appendAdminMessage(m) {
            const win = document.getElementById('admin-chat-window');
            const isMe = m.sender_email === 'admin';
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'msg-me' : 'msg-user'}`;
            
            let content = '';
            if(m.image_url) content += `<img src="${m.image_url}" onclick="window.open('${m.image_url}')">`;
            if(m.message) content += `<div>${m.message}</div>`;
            
            div.innerHTML = content;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function adminReply() {
            const input = document.getElementById('admin-reply-input');
            const text = input.value.trim();
            if(!text || !activeChatUser) return;
            input.value = '';

            await _supa.from('chats').insert([{
                sender_email: 'admin',
                message: text,
                recipient_role: activeChatUser,
                is_read: false
            }]);
        }

        async function adminSendImage(input) {
            const file = input.files[0];
            if(!file || !activeChatUser) return;

            const path = `uploads/admin_${Date.now()}_${file.name}`;
            await _supa.storage.from('chats').upload(path, file);
            const { data } = _supa.storage.from('chats').getPublicUrl(path);

            await _supa.from('chats').insert([{
                sender_email: 'admin',
                image_url: data.publicUrl,
                recipient_role: activeChatUser,
                is_read: false
            }]);
        }

        function closeAdminChat() {
            document.getElementById('admin-chat-modal').style.display = 'none';
            activeChatUser = null;
            fetchChatList();
        }

        function listenForNewMessages() {
            _supa.channel('global_chat_alerts')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, payload => {
                if(payload.new.recipient_role === 'admin' && payload.new.is_read === false) {
                    document.getElementById('global-unread').style.display = 'block';
                    if(!activeChatUser) fetchChatList();
                }
            }).subscribe();
        }

        // --- WITHDRAWAL & STATS ---
        async function updateStats() {
            try {
                const { count: users } = await _supa.from('profiles').select('*', { count: 'exact', head: true });
                const { count: pending } = await _supa.from('withdrawals').select('*', { count: 'exact', head: true }).eq('status', 'PENDING');
                document.getElementById('approved-count').innerText = users || 0;
                document.getElementById('pending-count').innerText = pending || 0;
            } catch(e) {}
        }

        async function fetchRequests() {
            const { data } = await _supa.from('withdrawals').select('*').eq('status', 'PENDING').order('created_at', { ascending: false });
            const container = document.getElementById('withdraw-container');
            if (data && data.length > 0) {
                container.innerHTML = data.map(req => {
                    const totalRefund = req.total_amount || req.original_amount || req.amount;
                    return `
                    <div class="withdraw-card" id="card-${req.id}">
                        <div class="card-header">
                            <div class="user-info"><span class="user-email">${req.email}</span><span class="req-date">${new Date(req.created_at).toLocaleString()}</span></div>
                            <div class="amount-tag">₦${req.amount.toLocaleString()}</div>
                        </div>
                        <div class="bank-details">
                            <div class="bank-row"><span class="bank-label">Bank:</span><span class="bank-val">${req.bank_name}</span></div>
                            <div class="bank-row"><span class="bank-label">Account:</span><span class="bank-val">${req.acc_num} <div class="copy-trigger bouncy" onclick="copyToClipboard('${req.acc_num}')"><i class="fa-solid fa-copy"></i></div></span></div>
                            <div class="bank-row"><span class="bank-label">Refund Total:</span><span class="bank-val" style="color:var(--warning)">₦${totalRefund.toLocaleString()}</span></div>
                        </div>
                        <div class="action-row">
                            <button onclick="askConfirm('approve', '${req.id}', '${req.amount}', '${req.email}', ${totalRefund})" class="action-btn btn-approve bouncy">APPROVE</button>
                            <button onclick="askConfirm('reject', '${req.id}', '${req.amount}', '${req.email}', ${totalRefund})" class="action-btn btn-reject bouncy">REJECT & REFUND</button>
                        </div>
                    </div>`;
                }).join('');
            } else { container.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.3; font-size:0.8rem;">No requests...</div>'; }
        }

        function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => { showToast("COPIED", "Account copied"); }); }

        function askConfirm(type, id, amt, email, totalRefund) {
            activeRequest = { type, id, amt, email, totalRefund };
            const modal = document.getElementById('confirm-modal');
            const btn = document.getElementById('final-confirm-btn');
            btn.disabled = false; btn.innerText = "Confirm";
            if (type === 'approve') {
                document.getElementById('confirm-title').innerText = "Approve Payout";
                document.getElementById('confirm-msg').innerText = `Confirm payout of ₦${amt} to ${email}.`;
                document.getElementById('confirm-icon').className = "fa-solid fa-circle-check";
                document.getElementById('confirm-icon').style.color = "var(--success)";
                btn.className = "btn btn-primary bouncy"; btn.onclick = processApproval;
            } else {
                document.getElementById('confirm-title').innerText = "Reject & Refund";
                document.getElementById('confirm-msg').innerText = `Refund ₦${totalRefund} to ${email}?`;
                document.getElementById('confirm-icon').className = "fa-solid fa-circle-xmark";
                document.getElementById('confirm-icon').style.color = "var(--error)";
                btn.className = "btn btn-reject bouncy"; btn.onclick = processRejection;
            }
            modal.style.display = "flex";
        }

        async function processApproval() {
            try {
                await _supa.from('withdrawals').update({ status: 'APPROVED' }).eq('id', activeRequest.id);
                uiRemoveCard(activeRequest.id);
                showToast("APPROVED", "Request cleared");
                closeConfirm();
            } catch(err) { alert(err.message); }
        }

        async function processRejection() {
            try {
                const { data: user } = await _supa.from('profiles').select('balance').eq('email', activeRequest.email).single();
                const newBalance = parseFloat(user.balance) + parseFloat(activeRequest.totalRefund);
                await _supa.from('withdrawals').update({ status: 'REJECTED' }).eq('id', activeRequest.id);
                await _supa.from('profiles').update({ balance: newBalance }).eq('email', activeRequest.email);
                uiRemoveCard(activeRequest.id);
                showToast("REFUNDED", `₦${activeRequest.totalRefund} returned`);
                closeConfirm();
            } catch (err) { alert(err.message); }
        }

        function uiRemoveCard(id) {
            const card = document.getElementById(`card-${id}`);
            if(card) { card.classList.add('fade-out'); setTimeout(() => { card.remove(); updateStats(); }, 400); }
        }

        function closeConfirm() { document.getElementById('confirm-modal').style.display = "none"; }
        function openBroadcastModal() { document.getElementById('broadcast-modal').style.display = 'flex'; }
        function closeBroadcastModal() { document.getElementById('broadcast-modal').style.display = 'none'; }

        function showToast(t, m, isError = false) {
            const wrap = document.getElementById('toast-wrap');
            const toast = document.createElement('div');
            toast.className = `toast show ${isError ? 'error' : ''}`;
            toast.innerHTML = `<div><div style="font-size:0.6rem; opacity:0.6;">SYSTEM</div><div style="color:${isError?'var(--error)':'var(--accent)'}">${t}</div></div><div style="opacity:0.8; font-weight:400; border-left:1px solid rgba(255,255,255,0.1); padding-left:12px;">${m}</div>`;
            wrap.appendChild(toast);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 4000);
        }

        async function sendBroadcast() {
            const msg = document.getElementById('broadcast-msg').value.trim();
            const imageFile = document.getElementById('broadcast-image').files[0];
            if(!msg) return showToast("INPUT REQUIRED", "Deployment requires a message", true);
            let imageUrl = null;
            try {
                if (imageFile) {
                    const fileName = `bc_${Date.now()}`;
                    await _supa.storage.from('notifications').upload(fileName, imageFile);
                    const { data } = _supa.storage.from('notifications').getPublicUrl(fileName);
                    imageUrl = data.publicUrl;
                }
                await _supa.from('notifications').insert([{ message: msg, image_url: imageUrl }]);
                showToast("SUCCESS", "Signal broadcasted");
                closeBroadcastModal();
            } catch (err) { showToast("FAILED", err.message, true); }
        }
        
        function previewBroadcastImg(input) {
            const preview = document.getElementById('broadcast-image-preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; }
                reader.readAsDataURL(input.files[0]);
            } else { preview.style.display = 'none'; }
        }
    </script>
</body>
</html>
